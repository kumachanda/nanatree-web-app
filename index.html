<html lang="ja">

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NanaTree Web</title>
<!-- 単一ファイル版（iPad対応）: tools/build_standalone.py 生成。編集は app/ 側で。 -->
<style>
/* app.css — NanaTree Web版 スタイル（ライトテーマ、外部フォント/CDN不使用） */

:root {
  --bg: #f4f5f7;
  --panel-bg: #ffffff;
  --border: #dcdfe4;
  --border-strong: #c2c7cf;
  --text: #202225;
  --text-muted: #6b7280;
  --accent: #2f6feb;
  --accent-weak: #e8f0fe;
  --danger: #d1373f;
  --warn-bg: #fff6e0;
  --warn-border: #e8c766;
  --warn-text: #7a5b00;
  --selected-bg: #dbeafe;
  --hover-bg: #eef1f5;
  --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
  --radius: 6px;
  font-size: 14px;
}

* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Yu Gothic UI", "Meiryo UI", "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
  color: var(--text);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

button {
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 10px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
button:hover { background: var(--hover-bg); }
button:active { background: var(--selected-bg); }
button.active {
  background: var(--accent-weak);
  border-color: var(--accent);
  color: var(--accent);
}
button:disabled { opacity: 0.45; cursor: default; }
button:disabled:hover { background: var(--panel-bg); }

select, input[type="text"], input[type="search"] {
  font-family: inherit;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 6px;
  background: var(--panel-bg);
  color: var(--text);
}

input[type="color"] {
  width: 28px;
  height: 28px;
  padding: 2px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--panel-bg);
  cursor: pointer;
}

/* ===================== ヘッダー ===================== */

.app-header {
  flex: 0 0 auto;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  z-index: 5;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  flex-wrap: wrap;
}

.toolbar .app-title {
  font-weight: bold;
  font-size: 15px;
  margin-right: 10px;
  color: var(--accent);
}

.toolbar .sep {
  width: 1px;
  align-self: stretch;
  background: var(--border);
  margin: 0 4px;
}

.toolbar .spacer { flex: 1 1 auto; }

.search-box {
  display: flex;
  align-items: center;
  gap: 4px;
}
.search-box input[type="search"] { width: 180px; }
.search-box .search-count { font-size: 12px; color: var(--text-muted); min-width: 48px; }

/* ===================== 本体レイアウト ===================== */

.app-body {
  flex: 1 1 auto;
  display: flex;
  min-height: 0;
}

.tree-pane {
  flex: 0 0 auto;
  width: 300px;
  min-width: 160px;
  max-width: 70vw;
  display: flex;
  flex-direction: column;
  background: var(--panel-bg);
  border-right: 1px solid var(--border);
  min-height: 0;
}

.tree-toolbar {
  flex: 0 0 auto;
  display: flex;
  gap: 4px;
  padding: 6px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.tree-toolbar button { padding: 4px 7px; font-size: 12px; }

.tree-scroll {
  flex: 1 1 auto;
  overflow: auto;
  padding: 4px 0;
  position: relative;
}
/* 十字キー操作のためフォーカス可能。枠線は出さず、選択ハイライトで現在位置を示す */
.tree-scroll:focus { outline: none; }
.tree-scroll:focus .tree-node-row.selected { box-shadow: inset 0 0 0 1px var(--accent); }

/* 本文中の <nlink> ノードリンク（クリックで同名ノードへジャンプ） */
.editor-content a.nlink {
  color: #1558d6;
  text-decoration: underline;
  cursor: pointer;
}
.editor-content a.nlink:hover { color: #0b3aa0; background: rgba(21, 88, 214, 0.08); }
/* <nlink> …</nlink> のタグ部分は薄く小さく表示（存在は見えるが目立たない） */
.editor-content a.nlink .nlink-tag {
  color: #9aa4b2;
  font-size: 0.82em;
  text-decoration: none;
}

/* 「ファイル ▾」などのドロップダウンメニュー */
.menu-group { position: relative; display: inline-block; }
.menu-group .dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  z-index: 50;
  margin-top: 2px;
  min-width: 220px;
  background: var(--panel-bg, #fff);
  border: 1px solid var(--border, #cfd6df);
  border-radius: 6px;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.16);
  padding: 4px;
}
.menu-group .dropdown[hidden] { display: none; }
.menu-group .dropdown button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 6px 10px;
  border: none;
  background: transparent;
  border-radius: 4px;
  white-space: nowrap;
}
.menu-group .dropdown button:hover { background: var(--selected-bg, #e8f0fe); }
.menu-group .dropdown .menu-sep { height: 1px; background: var(--border, #e2e6ea); margin: 4px 2px; }

/* 記号だけのボタン（元に戻す/やり直しなど）は少し大きめの記号で */
.btn-sym { font-size: 16px; line-height: 1; min-width: 30px; }

/* 本家NanaTree風メニューバー */
.menubar { display: flex; align-items: stretch; background: #f3f4f6; border-bottom: 1px solid var(--border, #d7dbe0); font-size: 13px; }
.menu { position: relative; }
.menu-label { border: none; background: transparent; padding: 4px 11px; cursor: pointer; font-size: 13px; color: inherit; }
.menu-label:hover, .menu.open .menu-label { background: #dfe6ef; }
.menu-list { display: none; position: absolute; top: 100%; left: 0; z-index: 200; min-width: 230px;
  background: #fff; border: 1px solid #cfd6df; box-shadow: 0 6px 20px rgba(0,0,0,.16); border-radius: 0 0 6px 6px; padding: 4px; }
.menu.open .menu-list { display: block; }
.menu-item { display: flex; justify-content: space-between; gap: 24px; width: 100%; text-align: left;
  border: none; background: transparent; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; white-space: nowrap; color: inherit; }
.menu-item:hover:not(:disabled) { background: var(--selected-bg, #e8f0fe); }
.menu-item:disabled { color: #aab2bd; cursor: default; }
.menu-item .mi-key { color: #8a94a2; font-size: 12px; }
.menu-list .menu-sep { height: 1px; background: #e2e6ea; margin: 4px 2px; }

/* アイコンだけのボタンは余白を詰める */
button > .btn-ico:only-child { margin-right: 0; }

.splitter {
  flex: 0 0 auto;
  width: 6px;
  cursor: col-resize;
  background: var(--border);
  position: relative;
}
.splitter:hover, .splitter.dragging { background: var(--accent); }

.editor-pane {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  background: var(--panel-bg);
}

/* ===================== ツリー ===================== */

.tree-node-row {
  display: flex;
  align-items: center;
  height: 26px;
  padding-right: 8px;
  cursor: default;
  user-select: none;
  border: 1px solid transparent;
  border-radius: 4px;
  margin: 0 4px;
  position: relative;
}
.tree-node-row:hover { background: var(--hover-bg); }
.tree-node-row.selected { background: var(--selected-bg); border-color: var(--accent); }

.tree-node-row .twisty {
  flex: 0 0 16px;
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 10px;
}
.tree-node-row .twisty.leaf { visibility: hidden; }

.tree-node-row .state-dot {
  flex: 0 0 8px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  background: transparent;
  border: 1px solid transparent;
}

.tree-node-row .title {
  flex: 1 1 auto;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
}
.tree-node-row .title.empty-title {
  color: var(--text-muted);
  font-style: italic;
}
.tree-node-row .title-input {
  flex: 1 1 auto;
  font-size: 13px;
  padding: 1px 4px;
  border: 1px solid var(--accent);
  border-radius: 3px;
}

.tree-node-row.drop-before::before,
.tree-node-row.drop-after::after {
  content: "";
  position: absolute;
  left: 20px;
  right: 4px;
  height: 2px;
  background: var(--accent);
}
.tree-node-row.drop-before::before { top: -2px; }
.tree-node-row.drop-after::after { bottom: -2px; }
.tree-node-row.drop-inside { background: var(--accent-weak); outline: 2px solid var(--accent); outline-offset: -2px; }

.tree-node-row.focused-marker .title { font-weight: bold; }

/* ===================== エディタ ===================== */

.editor-title-bar {
  flex: 0 0 auto;
  padding: 10px 14px 6px;
  border-bottom: 1px solid var(--border);
}
.editor-title-bar input {
  width: 100%;
  font-size: 16px;
  font-weight: bold;
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 4px 6px;
  background: transparent;
}
.editor-title-bar input:hover { border-color: var(--border); }
.editor-title-bar input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--panel-bg);
}

.editor-toolbar {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  background: #fafbfc;
}
.editor-toolbar button { padding: 4px 8px; font-size: 13px; min-width: 28px; justify-content: center; }
.editor-toolbar select { padding: 4px; }

.editor-scroll {
  flex: 1 1 auto;
  overflow: auto;
  min-height: 0;
  background: #fbfbfc;
}

.editor-content {
  min-height: 100%;
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 32px;
  background: var(--panel-bg);
  outline: none;
  font-size: 14px;
  line-height: 1.7;
}
.editor-content:empty::before {
  content: attr(data-placeholder);
  color: var(--text-muted);
}
.editor-content a.nana-nlink {
  color: var(--accent);
  text-decoration: underline dotted;
  cursor: pointer;
}

.editor-empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-size: 14px;
}

/* ===================== バナー ===================== */

.banner {
  flex: 0 0 auto;
  padding: 8px 14px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.banner.banner-error {
  background: #fdecec;
  color: #7a1512;
  border-bottom: 1px solid #f2b8b5;
}
.banner.banner-info {
  background: var(--warn-bg);
  color: var(--warn-text);
  border-bottom: 1px solid var(--warn-border);
}
.banner button {
  padding: 3px 9px;
  font-size: 12px;
}
.banner .banner-spacer { flex: 1 1 auto; }
.banner[hidden] { display: none; }

/* ===================== ステータスバー ===================== */

.status-bar {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--text-muted);
  background: var(--panel-bg);
  border-top: 1px solid var(--border);
}
.status-bar .status-message { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.status-bar .status-message.warn { color: var(--danger); font-weight: bold; }

/* ===================== コンテキストメニュー ===================== */

.context-menu {
  position: fixed;
  z-index: 100;
  background: var(--panel-bg);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 4px;
  min-width: 170px;
  display: none;
}
.context-menu.open { display: block; }
.context-menu button {
  display: flex;
  width: 100%;
  border: none;
  border-radius: 4px;
  padding: 6px 10px;
  justify-content: flex-start;
  background: transparent;
}
.context-menu button:hover { background: var(--hover-bg); }
.context-menu .menu-sep {
  height: 1px;
  background: var(--border);
  margin: 4px 2px;
}

/* ===================== ドラッグ&ドロップ オーバーレイ ===================== */

.dnd-overlay {
  position: fixed;
  inset: 0;
  background: rgba(47, 111, 235, 0.08);
  border: 3px dashed var(--accent);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--accent);
  font-weight: bold;
  pointer-events: none;
}
.dnd-overlay.active { display: flex; }

/* ===================== 可視性ユーティリティ ===================== */

[hidden] { display: none !important; }

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
}

</style>

  <!-- スクリプト読み込み（classicスクリプト。file:// でも動作。ESモジュール不使用） -->
  <script>
/*
 * core.js — NanaTree Web版 純粋ロジック層（DOM描画・イベント処理は一切行わない）
 *
 * 責務:
 *   - .nna 形式（文字列レベル。CP932バイト変換は呼び出し側=app.jsが window.NanaRTF で行う）の
 *     パース/シリアライズ: parseNna / serializeNna
 *   - OPML（Androidアプリ「バナナツリー」方言）のパース/生成: parseOpml / buildOpml
 *   - ツリーデータ構造（Node）に対する小さな純粋ヘルパー
 *
 * classic <script> として読み込む前提（ES modules不使用）。ここで宣言する関数・定数は
 * すべてトップレベルの var/function 宣言となり、グローバル（window直下）に現れる。
 *
 * 依存: DOMParser（ブラウザ標準。parseOpml / htmlToPlainText の実装に使用）。
 * 依存しないもの: window.NanaRTF、localStorage、fetch、その他あらゆるDOM描画API。
 * core-test.html はこのファイル単体で（NanaRTF無しで）動作する。
 */

(function (global) {
  'use strict';

  // =====================================================================
  // 共通ユーティリティ
  // =====================================================================

  var _nodeIdCounter = 1;

  /** 新しい一意ノードIDを1個払い出す（localStorageからの復元時など、既存オブジェクトへ
   *  IDを付け直したい場合に使用。createNode() 内部でも同じカウンタを使う）。 */
  function nextNodeId() {
    return 'n' + (_nodeIdCounter++);
  }

  /**
   * 新規ノードを生成する（.nna読込・OPML読込・UIでの新規追加、すべてこの関数を通す）。
   * データモデル:
   *   { id, title, rtf, html, dirty, stateIndex, expanded, focused, children }
   * rtf/html/dirty/stateIndex/expanded/children はタスク仕様に明記されたフィールド。
   * id と focused は実装上の必要から追加したフィールド（後述レポートで明記）。
   *   - id: DOM要素とデータノードを対応付けるための一意キー（アプリUI層で使用）。
   *   - focused: .nna の <attribute> 3項目め（フォーカス状態）を無劣化で読み書きするための保持領域。
   */
  function createNode(title) {
    return {
      id: 'n' + (_nodeIdCounter++),
      title: title == null ? '' : title,
      rtf: '',
      html: null,
      dirty: false,
      stateIndex: -1,
      expanded: false,
      focused: false,
      children: []
    };
  }

  /** ツリー全体を深さ優先（先行順）で走査し、各ノードに callback(node, parent, depth) を呼ぶ。 */
  function walkTree(roots, callback) {
    function rec(nodes, parent, depth) {
      for (var i = 0; i < nodes.length; i++) {
        var node = nodes[i];
        callback(node, parent, depth);
        if (node.children && node.children.length) {
          rec(node.children, node, depth + 1);
        }
      }
    }
    rec(roots || [], null, 0);
  }

  /** タイトル照合用の正規化: NFKC（全角/半角の統一）＋空白除去＋小文字化。
   *  例「図2ｂ：右側」も「図2b:右側」も同じキーになる。 */
  function normalizeTitle(s) {
    return String(s == null ? '' : s).normalize('NFKC').replace(/\s+/g, '').toLowerCase();
  }

  /** タイトルが一致する最初のノードを深さ優先で探す（<nlink>ジャンプ用）。見つからなければ null。
   *  完全一致を優先し、無ければ正規化一致（全角/半角・空白の違いを無視）で探す。
   *  同名が複数あれば、いずれも深さ優先で最初のものを返す（NanaTree本家と同じ挙動）。 */
  function findNodeByTitleDFS(roots, title) {
    var exact = null, norm = null;
    var target = normalizeTitle(title);
    function rec(nodes) {
      for (var i = 0; i < nodes.length; i++) {
        var node = nodes[i];
        if (exact === null && node.title === title) exact = node;
        if (norm === null && normalizeTitle(node.title) === target) norm = node;
        if (exact) return; // 完全一致が見つかればそれ以上探さない
        if (node.children && node.children.length) {
          rec(node.children);
          if (exact) return;
        }
      }
    }
    rec(roots || []);
    return exact || norm;
  }

  /** focused===true の最初のノードを深さ優先で探す（ファイルを開いた時の選択状態復元用）。 */
  function findFocusedNode(roots) {
    var found = null;
    walkTree(roots, function (node) {
      if (!found && node.focused) found = node;
    });
    return found;
  }

  // =====================================================================
  // .nna / .nnz パーサ・シリアライザ（文字列レベル）
  // =====================================================================

  var NNA_TAG_CHAPTER = '<chapter>';
  var NNA_TAG_ATTR = '<attribute>';
  var NNA_TAG_GROUP = '<group>';
  var NNA_TAG_UNGROUP = '</group>';
  var NNA_TAG_CONTENT = '<content>';
  var NNA_TAG_UNCONTENT = '</content>';

  /**
   * Delphi の TStrings.SetTextStr と同じ規則で行分割する:
   *   - CR、LF、CRLF のいずれも改行として扱う。
   *   - テキストが改行で終わっていても、末尾に余分な空行は生成しない
   *     （ちょうど文字列末尾で走査ループが終わるため）。
   * これにより readme.nna のように末尾が "</content>\r\n" で終わるファイルを
   * 読み込んでも、末尾に余分な空要素が入らない（Delphi実装と挙動を一致させる）。
   */
  function _nnaSplitLines(text) {
    var lines = [];
    var i = 0;
    var n = text.length;
    while (i < n) {
      var start = i;
      while (i < n && text.charAt(i) !== '\r' && text.charAt(i) !== '\n') i++;
      lines.push(text.slice(start, i));
      if (text.charAt(i) === '\r') i++;
      if (text.charAt(i) === '\n') i++;
    }
    return lines;
  }

  /**
   * 行配列を .nna 形式のテキストへ結合する。
   * Delphi の TStrings.GetTextStr は「各要素の直後（最後の要素も含む）」に改行を付与するため、
   * 生成するテキストは常に末尾に CRLF を持つ（readme.nna 実物で確認済み、末尾バイトが
   * "...</content>\x0D\x0A" であることを Format-Hex で確認）。
   */
  function _nnaJoinLines(lines) {
    var out = '';
    for (var i = 0; i < lines.length; i++) {
      out += lines[i] + '\r\n';
    }
    return out;
  }

  /**
   * .nna形式のテキスト（CP932デコード済みのJS文字列）をパースしてツリーを構築する。
   * 戻り値: { roots: [Node, ...] }
   *
   * タグの意味（FormTree.pas 241-247, 1268-1310, 249-430 で確認済み）:
   *   <chapter>タイトル       … 新ノード。直後に <attribute> 行が続く前提。
   *   <attribute>a,b,c        … a=stateIndex, b=「親ノードの開閉状態」(自ノードではない),
   *                             c=フォーカス。行欠落・項目不足には寛容（デフォルト -1,1,0）。
   *   <content> ... </content>… 本文RTF（複数行、CRLFで結合して1つの文字列に）。
   *   <group> / </group>      … 直前ノードの子階層に降りる／親階層に戻る。入れ子可。

  function parseNna(text) {

    var roots = [];
    var current = null;
    var ancestorStack = [];
    var i = 0;
    var n = lines.length;

    function siblingsArray() {
      return ancestorStack.length
        ? ancestorStack[ancestorStack.length - 1].children

    }

    function applyAttribute(node, attrLine) {
      var a = -1, b = 1, c = 0; // 寛容なデフォルト値（仕様指定）
      if (typeof attrLine === 'string' && attrLine.indexOf(NNA_TAG_ATTR) === 0) {
        var rest = attrLine.slice(NNA_TAG_ATTR.length);
        var parts = rest.split(',');
        if (parts.length > 0 && parts[0].trim() !== '') {
          var va = parseInt(parts[0], 10);
          if (!isNaN(va)) a = va;

        if (parts.length > 1 && parts[1].trim() !== '') {

          if (!isNaN(vb)) b = vb;

        if (current) ancestorStack.push(current);

      if (typeof line === 'string' && line.indexOf(NNA_TAG_CHAPTER) === 0) {
        var title = line.slice(NNA_TAG_CHAPTER.length);
        var node = createNode(title);

          applyAttribute(node, lines[i]);
          i++;

          // <attribute> 行が欠落している場合はデフォルト値を適用し、
          // 現在行は消費せず再度メインループで処理する（<content>等の可能性があるため）。
          applyAttribute(node, null);
        }
        continue;
      }

      if (line === NNA_TAG_CONTENT) {
        i++;
        var bodyLines = [];
        while (i < n && lines[i] !== NNA_TAG_UNCONTENT) {
          bodyLines.push(lines[i]);
          i++;

        if (current) {
          current.rtf = bodyLines.length ? bodyLines.join('\r\n') : '';

        if (i < n && lines[i] === NNA_TAG_UNCONTENT) i++;

   * ブロック要素（div/p/liなど）の境界と <br> を改行として扱う。

   */

  // =====================================================================
  // OPML（バナナツリー方言）パーサ・ビルダー

  function xmlEscapeText(s) {

      .replace(/&/g, '&amp;')

  function _outlineElToNode(el) {

  /**

      var noteText = htmlToPlainText(node.html || '');

 * 依存しないもの: core.js, app.js, その他DOM描画API。
 *
 * ---------------------------------------------------------------------------
 * readme.nna (C:\AIWorks\NANA\NanaTree105_Source\exe\readme.nna, CP932) から
 * PowerShellで実測した実RTFの特徴（詳細は本ファイル末尾の報告コメント、または
 * 委譲元への報告メッセージを参照）:
 *   - ヘッダ: {\rtf1\ansi\ansicpg932\deff0{\fonttbl{\f0\fnil\fcharset128 <CP932名>;}...}

(function (global) {

  // =====================================================================
  // 1. CP932 (Shift_JIS) コーデック

  var _cp932EncodeMap = null; // Map<char, Uint8Array> — 初回呼び出し時に生成してキャッシュ

  function buildCP932EncodeMap() {
    var map = new Map();
    var decoder;
    try {
      decoder = new TextDecoder('shift_jis', { fatal: true });
    } catch (e) {
      // 環境がshift_jisラベルに対応していない場合の防御（通常発生しない）。

    for (b = 0x40; b <= 0x7e; b++) trails.push(b);
    for (b = 0x80; b <= 0xfc; b++) trails.push(b);

    var li, ti, lead, trail, pair;
    for (li = 0; li < leads.length; li++) {

  /**

      if (code >= 0xd800 && code <= 0xdbff && i + 1 < len) {

  }

  // 標準RTFハイライトカラー16色（\highlightN のデコード専用。生成側は\cbNを使う）。
  var HIGHLIGHT_PALETTE = {
    1: '#000000', 2: '#0000ff', 3: '#00ffff', 4: '#00ff00',
    5: '#ff00ff', 6: '#ff0000', 7: '#ffff00', 8: '#ffffff',
    9: '#000080', 10: '#008080', 11: '#008000', 12: '#800080',
    13: '#800000', 14: '#808000', 15: '#808080', 16: '#c0c0c0'
  };

  // readme.nna から実測したデフォルト日本語フォント名
  // ({\f0\fnil\fcharset128 \'82\'6c\'82\'72 \'82\'6f\'83\'53\'83\'56\'83\'62\'83\'4e;} を
  //  CP932でデコードした実際の文字列。"ＭＳ Ｐゴシック"＝MS Pゴシック）。
  var DEFAULT_FONT_NAME = 'ＭＳ Ｐゴシック'; // "ＭＳ Ｐゴシック"

  // =====================================================================
  // 3. rtfToHtml: トークナイザ
  // =====================================================================

  /**
   * posの位置から1トークンを読む。
   * type: 'open' | 'close' | 'hex' | 'ctrlsym' | 'ctrlword' | 'text'
   */
  function nextToken(s, pos) {
    var n = s.length;
    if (pos >= n) return { type: 'text', text: '', end: pos };
    var c = s.charAt(pos);
    if (c === '{') return { type: 'open', end: pos + 1 };
    if (c === '}') return { type: 'close', end: pos + 1 };
    if (c === '\\') {
      var c2 = pos + 1 < n ? s.charAt(pos + 1) : '';
      if (c2 === '') return { type: 'text', text: '\\', end: pos + 1 };
      if (c2 === "'") {
        var hex = s.substr(pos + 2, 2);
        var byte = parseInt(hex, 16);
        if (isNaN(byte)) byte = 0;
        return { type: 'hex', byte: byte, end: pos + 4 };
      }
      if (/[a-zA-Z]/.test(c2)) {
        var i = pos + 1;
        var name = '';
        while (i < n && /[a-zA-Z]/.test(s.charAt(i))) { name += s.charAt(i); i++; }
        var paramStr = '';
        if (s.charAt(i) === '-') { paramStr += '-'; i++; }
        while (i < n && /[0-9]/.test(s.charAt(i))) { paramStr += s.charAt(i); i++; }
        var param = paramStr === '' ? null : parseInt(paramStr, 10);
        var end = i;
        if (s.charAt(i) === ' ') end = i + 1; // 区切り空白1個は消費する
        return { type: 'ctrlword', name: name, param: param, end: end };
      }
      // 制御記号（\\ \{ \} \~ \- \_ など、英字以外の1文字）
      return { type: 'ctrlsym', ch: c2, end: pos + 2 };
    }
    // プレーンテキスト連: 次の \ または { } まで
    var j = pos;
    while (j < n) {
      var cj = s.charAt(j);
      if (cj === '\\' || cj === '{' || cj === '}') break;
      j++;
    }
    return { type: 'text', text: s.slice(pos, j), end: j };
  }

  /**
   * startIdx（'{' の位置）から対応する '}' の直後の位置を返す。
   * \\ \{ \} エスケープを考慮した単純な深さカウントで、O(n)・例外を投げない。
   * \pict / \object の巨大な16進データを高速に読み飛ばすために使う。
   */
  function findGroupEnd(s, startIdx) {
    var n = s.length;
    var depth = 0;
    var i = startIdx;
    while (i < n) {
      var c = s.charAt(i);
      if (c === '\\') {
        i += 2; // エスケープ済み文字 or 制御語の先頭2文字をまとめてスキップ（波括弧安全のみが目的）
        continue;
      } else if (c === '{') {
        depth++; i++;
      } else if (c === '}') {
        depth--; i++;
        if (depth <= 0) return i;
      } else {
        i++;
      }
    }
    return n; // 対応する閉じ括弧が無い（壊れたRTF）: 末尾まで読み飛ばす
  }

  // =====================================================================
  // 4. rtfToHtml: フォント/カラーテーブル パーサ
  // =====================================================================

  function parseFontTable(rtf, openPos) {
    var end = findGroupEnd(rtf, openPos);
    var fonts = {};
    var pos = openPos + 1;
    var depth = 1;
    var curIdx = null, curCharset = 0, nameParts = [];

    function flushName() {
      if (curIdx != null) {
        var combined = nameParts.join('');
        fonts[curIdx] = { name: combined, charset: curCharset };
      }
      curIdx = null; curCharset = 0; nameParts = [];
    }

    while (pos < end) {
      var t = nextToken(rtf, pos);
      if (t.type === 'open') { depth++; pos = t.end; continue; }
      if (t.type === 'close') {
        depth--; pos = t.end;
        if (depth <= 0) break;
        continue;
      }
      if (t.type === 'ctrlword') {
        if (t.name === 'f') { flushName(); curIdx = t.param; }
        else if (t.name === 'fcharset') { curCharset = t.param; }
        // fnil / fswiss / fprq / fbias 等は無視
        pos = t.end; continue;
      }
      if (t.type === 'hex') {
        var bytes = [t.byte];
        var p = t.end;
        while (true) {
          var t2 = nextToken(rtf, p);
          if (t2.type === 'hex') { bytes.push(t2.byte); p = t2.end; } else break;
        }
        pos = p;
        nameParts.push(decodeCP932Bytes(bytes));
        continue;
      }
      if (t.type === 'text') {
        pos = t.end;
        var txt = t.text;
        if (txt.indexOf(';') !== -1) {
          var parts = txt.split(';');
          for (var k = 0; k < parts.length; k++) {
            if (parts[k]) nameParts.push(parts[k]);
            if (k < parts.length - 1) flushName();
          }
        } else {
          nameParts.push(txt);
        }
        continue;
      }
      pos = t.end; // ctrlsym等は無視
    }
    flushName();
    return { fonts: fonts, end: end };
  }

  function parseColorTable(rtf, openPos) {
    var end = findGroupEnd(rtf, openPos);
    var colors = [];
    var pos = openPos + 1;
    var r = 0, g = 0, b = 0, seen = false;
    while (pos < end) {
      var t = nextToken(rtf, pos);
      if (t.type === 'open' || t.type === 'close') { pos = t.end; continue; }
      if (t.type === 'ctrlword') {
        if (t.name === 'red') { r = t.param || 0; seen = true; }
        else if (t.name === 'green') { g = t.param || 0; seen = true; }
        else if (t.name === 'blue') { b = t.param || 0; seen = true; }
        pos = t.end; continue;
      }
      if (t.type === 'text') {
        var txt = t.text;
        for (var ci = 0; ci < txt.length; ci++) {
          if (txt.charAt(ci) === ';') {
            colors.push(seen ? { r: r, g: g, b: b } : null);
            r = 0; g = 0; b = 0; seen = false;
          }
        }
        pos = t.end; continue;
      }
      pos = t.end;
    }
    return { colors: colors, end: end };
  }

  // =====================================================================
  // 5. rtfToHtml: 本体
  // =====================================================================

  // シンボルフォント(\fcharset2)向けの最低限のグリフ対応表（\'B7 = ・ 箇条書き用ビュレット）。
  // それ以外のバイトはPhase1の割り切りとしてバイト値をそのままcode pointにフォールバックする。
  var SYMBOL_FONT_MAP = { 0xb7: '•' };

  function defaultDecodeState() {
    return {
      bold: false, italic: false, underline: false, strike: false, vertAlign: null,
      fontIdx: 0, fontSize: null, colorIdx: null, highlightIdx: null, cbIdx: null,
      align: 'left', li: 0, fi: 0, ucSkip: 1
    };
  }

  function cloneState(s) {
    return {
      bold: s.bold, italic: s.italic, underline: s.underline, strike: s.strike, vertAlign: s.vertAlign,
      fontIdx: s.fontIdx, fontSize: s.fontSize, colorIdx: s.colorIdx, highlightIdx: s.highlightIdx, cbIdx: s.cbIdx,
      align: s.align, li: s.li, fi: s.fi, ucSkip: s.ucSkip
    };
  }

  function snapshotFmt(s) {
    return {
      bold: s.bold, italic: s.italic, underline: s.underline, strike: s.strike, vertAlign: s.vertAlign,
      fontIdx: s.fontIdx, fontSize: s.fontSize, colorIdx: s.colorIdx, highlightIdx: s.highlightIdx, cbIdx: s.cbIdx
    };
  }

  function fmtEqual(a, b) {
    return a.bold === b.bold && a.italic === b.italic && a.underline === b.underline &&
      a.strike === b.strike && a.vertAlign === b.vertAlign && a.fontIdx === b.fontIdx &&
      a.fontSize === b.fontSize && a.colorIdx === b.colorIdx && a.highlightIdx === b.highlightIdx &&
      a.cbIdx === b.cbIdx;
  }

  function convertRtfToHtml(rtf) {
    var pos = 0;
    var n = rtf.length;
    var stack = [];
    var state = defaultDecodeState();
    var fonts = {};
    var colors = [];
    var paragraphs = [];
    var pieces = [];
    var inTable = false;
    var currentTable = null;
    var currentRowCells = [];
    var awaitingRowOrEnd = false;
    var skipRemaining = 0;

    function pushText(text, fmt) {
      if (!text) return;
      var last = pieces.length ? pieces[pieces.length - 1] : null;
      if (last && last.type === 'text' && fmtEqual(last.fmt, fmt)) {
        last.text += text;
      } else {
        pieces.push({ type: 'text', text: text, fmt: fmt });
      }
    }
    function pushBr() { pieces.push({ type: 'br' }); }
    function pushRaw(html) { pieces.push({ type: 'raw', html: html }); }

    function flushHexBytes(bytes) {
      var font = fonts[state.fontIdx];
      var text;
      if (font && font.charset === 2) {
        var out = '';
        for (var i = 0; i < bytes.length; i++) {
          out += SYMBOL_FONT_MAP.hasOwnProperty(bytes[i]) ? SYMBOL_FONT_MAP[bytes[i]] : String.fromCharCode(bytes[i]);
        }
        text = out;
      } else {
        text = decodeCP932Bytes(bytes);
      }
      pushText(text, snapshotFmt(state));
    }

    function runToHtml(run) {
      var text = escapeHtml(run.text);
      if (run.fmt.vertAlign === 'super') text = '<sup>' + text + '</sup>';
      else if (run.fmt.vertAlign === 'sub') text = '<sub>' + text + '</sub>';
      if (run.fmt.strike) text = '<s>' + text + '</s>';
      if (run.fmt.underline) text = '<u>' + text + '</u>';
      if (run.fmt.italic) text = '<i>' + text + '</i>';
      if (run.fmt.bold) text = '<b>' + text + '</b>';
      var styles = [];
      if (run.fmt.fontSize != null) styles.push('font-size:' + (run.fmt.fontSize / 2) + 'pt');
      if (run.fmt.colorIdx != null && colors[run.fmt.colorIdx]) styles.push('color:' + rgbToHex(colors[run.fmt.colorIdx]));
      if (run.fmt.highlightIdx != null && HIGHLIGHT_PALETTE[run.fmt.highlightIdx]) styles.push('background-color:' + HIGHLIGHT_PALETTE[run.fmt.highlightIdx]);
      if (run.fmt.cbIdx != null && colors[run.fmt.cbIdx]) styles.push('background-color:' + rgbToHex(colors[run.fmt.cbIdx]));
      if (run.fmt.fontIdx != null && fonts[run.fmt.fontIdx] && fonts[run.fmt.fontIdx].name) {
        styles.push('font-family:' + JSON.stringify(fonts[run.fmt.fontIdx].name));
      }
      // style属性値もエスケープする。フォント名は攻撃者制御の文字列になり得るため、
      // ここを素通しにすると font-family 経由でstyle属性を閉じてタグ注入(XSS)ができてしまう。
      if (styles.length) text = '<span style="' + escapeHtml(styles.join(';')) + '">' + text + '</span>';
      return text;
    }

    function piecesToHtml(list) {
      var out = '';
      for (var i = 0; i < list.length; i++) {
        var p = list[i];
        if (p.type === 'br') out += '<br>';
        else if (p.type === 'raw') out += p.html;
        else out += runToHtml(p);
      }
      return out;
    }

    function flushParagraph() {
      var styles = [];
      if (state.align === 'center') styles.push('text-align:center');
      else if (state.align === 'right') styles.push('text-align:right');
      else if (state.align === 'justify') styles.push('text-align:justify');
      if (state.li) styles.push('margin-left:' + Math.round(state.li / 15) + 'px');
      if (state.fi) styles.push('text-indent:' + Math.round(state.fi / 15) + 'px');
      var styleAttr = styles.length ? ' style="' + styles.join(';') + '"' : '';
      var inner = piecesToHtml(pieces);
      paragraphs.push(inner ? '<div' + styleAttr + '>' + inner + '</div>' : '<div' + styleAttr + '><br></div>');
      pieces = [];
    }

    function finalizeTable() {
      if (!currentTable || currentTable.rows.length === 0) { currentTable = null; return; }
      var html = '<table border="1">';
      for (var r = 0; r < currentTable.rows.length; r++) {
        html += '<tr>';
        var row = currentTable.rows[r];
        for (var c = 0; c < row.length; c++) html += '<td>' + row[c] + '</td>';
        html += '</tr>';
      }
      html += '</table>';
      paragraphs.push(html);
      currentTable = null;
    }

    while (pos < n) {
      // \u フォールバック文字のスキップ処理（\ucN で指定された個数のトークン/文字を無視する）
      if (skipRemaining > 0) {
        var stok = nextToken(rtf, pos);
        if (stok.type === 'text' && stok.text.length > 0) {
          var consume = Math.min(skipRemaining, stok.text.length);
          skipRemaining -= consume;
          pos += consume;
          continue;
        } else {
          skipRemaining -= 1;
          pos = stok.end;
          continue;
        }
      }

      var tok = nextToken(rtf, pos);

      // 表の行終端直後: 次が \trowd でなければ表を確定して閉じる
      if (awaitingRowOrEnd) {
        var isTrowd = (tok.type === 'ctrlword' && tok.name === 'trowd');
        if (!isTrowd) { finalizeTable(); inTable = false; }
        awaitingRowOrEnd = false;
      }

      if (tok.type === 'open') {
        var peek = nextToken(rtf, pos + 1);
        if (peek.type === 'ctrlword' && peek.name === 'fonttbl') {
          var fr = parseFontTable(rtf, pos);
          for (var fk in fr.fonts) if (fr.fonts.hasOwnProperty(fk)) fonts[fk] = fr.fonts[fk];
          pos = fr.end; continue;
        }
        if (peek.type === 'ctrlword' && peek.name === 'colortbl') {
          var cr = parseColorTable(rtf, pos);
          colors = cr.colors;
          pos = cr.end; continue;
        }
        if (peek.type === 'ctrlword' && (peek.name === 'stylesheet' || peek.name === 'info' || peek.name === 'generator')) {
          pos = findGroupEnd(rtf, pos); continue;
        }
        if (peek.type === 'ctrlword' && peek.name === 'pict') {
          pos = findGroupEnd(rtf, pos);
          pushRaw('<span class="nna-pict" data-skipped="1">[画像]</span>'); // [画像]
          continue;
        }
        if (peek.type === 'ctrlword' && peek.name === 'object') {
          pos = findGroupEnd(rtf, pos);
          pushRaw('<span class="nna-object" data-skipped="1">[オブジェクト]</span>'); // [オブジェクト]
          continue;
        }
        if (peek.type === 'ctrlsym' && peek.ch === '*') {
          pos = findGroupEnd(rtf, pos); continue; // 未知の {\*\...} 宛先は読み飛ばし
        }
        // 通常のグループ: 書式状態をpush
        stack.push(cloneState(state));
        pos = pos + 1;
        continue;
      }

      if (tok.type === 'close') {
        if (stack.length > 0) state = stack.pop();
        pos = pos + 1;
        continue;
      }

      if (tok.type === 'hex') {
        var bytes = [tok.byte];
        var hp = tok.end;
        while (true) {
          var ht = nextToken(rtf, hp);
          if (ht.type === 'hex') { bytes.push(ht.byte); hp = ht.end; } else break;
        }
        pos = hp;
        flushHexBytes(bytes);
        continue;
      }

      if (tok.type === 'ctrlsym') {
        pos = tok.end;
        switch (tok.ch) {
          case '\\': pushText('\\', snapshotFmt(state)); break;
          case '{': pushText('{', snapshotFmt(state)); break;
          case '}': pushText('}', snapshotFmt(state)); break;
          case '~': pushText(' ', snapshotFmt(state)); break;
          case '-': /* optional hyphen: 表示上は無視 */ break;
          case '_': pushText('‑', snapshotFmt(state)); break; // 改行不可ハイフン相当
          default: break;
        }
        continue;
      }

      if (tok.type === 'ctrlword') {
        pos = tok.end;
        var name = tok.name, param = tok.param;
        switch (name) {
          case 'par':
            flushParagraph();
            break;
          case 'line':
            pushBr();
            break;
          case 'tab':
            pushText('\t', snapshotFmt(state));
            break;
          case 'pard':
            state.align = 'left'; state.li = 0; state.fi = 0;
            break;
          case 'qc': state.align = 'center'; break;
          case 'qr': state.align = 'right'; break;
          case 'ql': state.align = 'left'; break;
          case 'qj': state.align = 'justify'; break;
          case 'li': state.li = param || 0; break;
          case 'fi': state.fi = param || 0; break;
          case 'b': state.bold = (param === 0) ? false : true; break;
          case 'i': state.italic = (param === 0) ? false : true; break;
          case 'ul': state.underline = (param === 0) ? false : true; break;
          case 'ulnone': state.underline = false; break;
          case 'strike': state.strike = (param === 0) ? false : true; break;
          case 'super': state.vertAlign = 'super'; break;
          case 'sub': state.vertAlign = 'sub'; break;
          case 'nosupersub': state.vertAlign = null; break;
          case 'f': state.fontIdx = param; break;
          case 'fs': state.fontSize = param; break;
          case 'cf': state.colorIdx = param; break;
          case 'highlight': state.highlightIdx = param; break;
          case 'cb': state.cbIdx = param; break;
          case 'uc': state.ucSkip = (param == null) ? 1 : param; break;
          case 'u': {
            var val = param;
            if (val == null) val = 0;
            if (val < 0) val += 65536;
            pushText(String.fromCharCode(val), snapshotFmt(state));
            skipRemaining = state.ucSkip;
            break;
          }
          case 'trowd':
            inTable = true;
            if (!currentTable) currentTable = { rows: [] };
            currentRowCells = [];
            pieces = [];
            break;
          case 'cellx':
            // 列幅は無視する
            break;
          case 'intbl':
            if (!inTable) { inTable = true; if (!currentTable) currentTable = { rows: [] }; }
            break;
          case 'cell':
            currentRowCells.push(piecesToHtml(pieces));
            pieces = [];
            break;
          case 'row':
            currentTable.rows.push(currentRowCells);
            currentRowCells = [];
            awaitingRowOrEnd = true;
            break;
          default:
            // 未知/非対応の制御語は無視（防御的）
            break;
        }
        continue;
      }

      // plain text
      pos = tok.end;
      if (tok.text) {
        var cleaned = tok.text.replace(/[\r\n]/g, '');
        if (cleaned) pushText(cleaned, snapshotFmt(state));
      }
    }

    if (inTable) finalizeTable();
    if (pieces.length) flushParagraph();

    return paragraphs.join('');
  }

  function rtfToHtml(rtf) {
    if (rtf == null) return '';
    try {
      return convertRtfToHtml(String(rtf));
    } catch (e) {
      // 最終防衛ライン: 例外を投げず、可能な限りテキストとして復元する
      try {
        var raw = String(rtf).replace(/\\par\b\s?/g, '\n').replace(/\\'[0-9a-fA-F]{2}/g, ' ');
        var lines = raw.split('\n');
        var out = '';
        for (var i = 0; i < lines.length; i++) out += '<div>' + escapeHtml(lines[i]) + '</div>';
        return out || '<div><br></div>';
      } catch (e2) {
        return '<div><br></div>';
      }
    }
  }

  // =====================================================================
  // 6. htmlToRtf: 補助（色/フォントサイズのパース）
  // =====================================================================

  var NAMED_COLORS = {
    black: [0, 0, 0], white: [255, 255, 255], red: [255, 0, 0], green: [0, 128, 0],
    blue: [0, 0, 255], yellow: [255, 255, 0], gray: [128, 128, 128], grey: [128, 128, 128],
    orange: [255, 165, 0], purple: [128, 0, 128], silver: [192, 192, 192], navy: [0, 0, 128],
    teal: [0, 128, 128], lime: [0, 255, 0], maroon: [128, 0, 0], olive: [128, 128, 0],
    aqua: [0, 255, 255], fuchsia: [255, 0, 255]
  };

  function parseColor(str) {
    if (!str) return null;
    var s = String(str).trim().toLowerCase();
    if (s === '' || s === 'transparent') return null;
    var m = s.match(/^#([0-9a-f]{6})$/);
    if (m) {
      var num = parseInt(m[1], 16);
      return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
    }
    m = s.match(/^#([0-9a-f]{3})$/);
    if (m) {
      var h = m[1];
      return { r: parseInt(h.charAt(0) + h.charAt(0), 16), g: parseInt(h.charAt(1) + h.charAt(1), 16), b: parseInt(h.charAt(2) + h.charAt(2), 16) };
    }
    m = s.match(/^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
    if (m) return { r: +m[1], g: +m[2], b: +m[3] };
    if (NAMED_COLORS.hasOwnProperty(s)) {
      var c = NAMED_COLORS[s];
      return { r: c[0], g: c[1], b: c[2] };
    }
    return null;
  }

  function parseFontSizePt(str) {
    if (!str) return null;
    var s = String(str).trim().toLowerCase();
    var m = s.match(/^([\d.]+)pt$/); if (m) return parseFloat(m[1]);
    m = s.match(/^([\d.]+)px$/); if (m) return parseFloat(m[1]) * 0.75;
    m = s.match(/^([\d.]+)em$/); if (m) return parseFloat(m[1]) * 12;
    m = s.match(/^([\d.]+)$/); if (m) return parseFloat(m[1]);
    return null;
  }

  var LEGACY_FONT_SIZE_PT = { 1: 8, 2: 10, 3: 12, 4: 14, 5: 18, 6: 24, 7: 36 };

  function guessCharsetForFont(name) {
    for (var i = 0; i < name.length; i++) {
      if (name.charCodeAt(i) > 0x7e) return 128; // 日本語フォント想定
    }
    return 0; // ANSI
  }

  /** RTFテキスト用エスケープ（\\ \{ \} と、CP932化できる非ASCII文字の \'xx 化、
   *  できない文字の \uN? フォールバック）。制御語自体はここでは生成しない。 */
  function encodeTextToRtf(str) {
    var s = String(str);
    var out = '';
    for (var i = 0; i < s.length; i++) {
      var ch = s.charAt(i);
      var code = s.charCodeAt(i);

/*
 * treetext.js — 階層化テキスト形式の入出力（NanaTree互換）
 *
 * 形式仕様（NanaTree105 FormTree.pas AddTreeFromTreeTextFile /
 * FormMain.pas ExportDocTreeTxt から解読）:
 *   - 行頭が '.' で始まる行はノード見出し。連続するピリオドの数が階層
 *     （ルート=1個、子=2個…）。ピリオドの後ろがタイトル。
 *   - それ以外の行は直前ノードの本文（プレーンテキスト、書式なし）。
 *   - 本文行が '.' で始まる場合はノード見出しと区別できない（元実装と同じ制限）。
 *
 * グローバル: window.NanaTreeText = { parseTreeText, buildTreeText }
 */
(function () {
  'use strict';

  // parseTreeText(text) -> [{ title, bodyText, children }]
  // 相対階層方式: 最初のノード行のピリオド数を基準階層とする（元実装と同じ挙動）。
  function parseTreeText(text) {
    var lines = String(text).replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    // 末尾の空行1つは行分割の産物なので落とす（"a\n" -> ["a"]）
    if (lines.length && lines[lines.length - 1] === '') lines.pop();

    var roots = [];
    // スタック: 各階層の「現在のノード」。stack[0] はルート配列の直近ノード。
    var stack = []; // 要素: { node, tier }
    var baseTier = null;

    function newNode(title) {
      return { title: title, bodyLines: [], children: [] };
    }

    function appendAt(tier, node) {
      // tier: 1 = ルート階層
      while (stack.length && stack[stack.length - 1].tier >= tier) stack.pop();
      if (!stack.length) {
        roots.push(node);
      } else {
        stack[stack.length - 1].node.children.push(node);
      }
      stack.push({ node: node, tier: tier });
    }

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.charAt(0) === '.') {
        var dots = 0;
        while (dots < line.length && line.charAt(dots) === '.') dots++;
        var title = line.slice(dots);
        if (baseTier === null) baseTier = dots;
        // 基準からの相対で 1 始まりの階層へ正規化（深すぎるジャンプは1段に丸める:
        // 元実装は多段ジャンプで空ノードを補うが、実用上は1段扱いのほうが安全）
        var tier = dots - baseTier + 1;
        if (tier < 1) tier = 1;
        var top = stack.length ? stack[stack.length - 1].tier : 0;
        if (tier > top + 1) tier = top + 1;
        appendAt(tier, newNode(title));
      } else {
        // 本文行。先頭にノード行が無いままの本文は無題ノードに入れる（元実装と同挙動）
        if (!stack.length) appendAt(1, newNode(''));
        stack[stack.length - 1].node.bodyLines.push(line);
      }
    }

    return roots.map(finalize);

    function finalize(n) {
      return {
        title: n.title,
        bodyText: n.bodyLines.join('\n'),
        children: n.children.map(finalize)
      };
    }

  // buildTreeText(roots) -> string
  // roots: [{ title, bodyText, children }]（bodyText はプレーンテキスト。呼び出し側で
  // RTF/HTML からの変換を済ませておくこと）
  // 出力は NanaTree の ExportDocTreeTxt と同じ構造:
  //   ピリオド(階層数) + タイトル / 本文行（空でも1行）/ 子を再帰
  // 改行は CRLF（NanaTree が読むファイルのため）。
  function buildTreeText(roots) {
    var out = [];

      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        out.push(repeatDot(tier) + (n.title || ''));
        // NanaTree は本文が空でも空行を1行書く（Copy(Text,1,Len-2) の仕様）
        var body = (n.bodyText || '').replace(/\r\n/g, '\n');
        var bodyLines = body.split('\n');
        for (var j = 0; j < bodyLines.length; j++) out.push(bodyLines[j]);

    return out.join('\r\n') + '\r\n';

  function repeatDot(n) {
    var s = '';
    while (n-- > 0) s += '.';
    return s;
  }

  window.NanaTreeText = {
    parseTreeText: parseTreeText,
    buildTreeText: buildTreeText
  };
})();
