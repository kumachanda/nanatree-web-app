          }
          continue;
        }
        i += 2;
        continue;
      }
      if (c === 0x0d || c === 0x0a) { i++; continue; }
      if (c < 128) textBytes.push(c);
      else { flushBytes(); text.push(s.charAt(i)); }
      i++;
    }
    endPar();
    return { paras: out, blobs: blobs };
  }

  // ===================================================================
  // 2. WMF/EMF 埋め込みDIB -> BMPバイト列（convert_images.py の移植）
  // ===================================================================
  function u32(dv, o) { return dv.getUint32(o, true); }
  function u16(dv, o) { return dv.getUint16(o, true); }

  function extractEmf(b) {
    var dv = new DataView(b.buffer, b.byteOffset, b.byteLength);
    var off = 18, parts = [], n = b.length;
    while (off + 6 <= n) {
      var sizeWords = u32(dv, off), func = u16(dv, off + 4);
      if (sizeWords < 3) break;
      // func 0x0626 (META_ESCAPE) + 'WMFC' コメント = 埋め込みEMFチャンク
      if (func === 0x0626 && off + 14 <= n &&
          b[off + 10] === 0x57 && b[off + 11] === 0x4D && b[off + 12] === 0x46 && b[off + 13] === 0x43) {
        var curSize = u32(dv, off + 32);
        var dataStart = off + 44;
        parts.push(b.subarray(dataStart, dataStart + curSize));
      }
      if (func === 0) break;
      off += sizeWords * 2;
    }
    var total = 0, k;
    for (k = 0; k < parts.length; k++) total += parts[k].length;
    var outb = new Uint8Array(total), p = 0;
    for (k = 0; k < parts.length; k++) { outb.set(parts[k], p); p += parts[k].length; }
    return outb;
  }

  function dibsFromEmf(emf) {
    var dv = new DataView(emf.buffer, emf.byteOffset, emf.byteLength);
    var out = [], off = 0, n = emf.length;
    while (off + 8 <= n) {
      var itype = u32(dv, off), size = u32(dv, off + 4);
      if (size < 8 || off + size > n) break;
      if (itype === 81 || itype === 80) { // STRETCHDIBITS / SETDIBITSTODEVICE
        var offBmi = u32(dv, off + 48), cbBmi = u32(dv, off + 52),
            offBits = u32(dv, off + 56), cbBits = u32(dv, off + 60);
        out.push([emf.subarray(off + offBmi, off + offBmi + cbBmi),
                  emf.subarray(off + offBits, off + offBits + cbBits)]);
      } else if (itype === 76 || itype === 77) { // BITBLT / STRETCHBLT
        var base = 84;
        if (off + base + 16 <= n) {
          var ob = u32(dv, off + base), cb = u32(dv, off + base + 4),
              obit = u32(dv, off + base + 8), cbit = u32(dv, off + base + 12);
          if (cb && cbit && off + obit + cbit <= n) {
            out.push([emf.subarray(off + ob, off + ob + cb),
                      emf.subarray(off + obit, off + obit + cbit)]);
          }
        }
      }
      off += size;
      if (itype === 14) break;
    }
    return out;
  }

  function splitDib(d) {
    if (d.length < 40) return null;
    var dv = new DataView(d.buffer, d.byteOffset, d.byteLength);
    var hsz = u32(dv, 0);
    if (hsz < 40 || hsz > 128) return null;
    var bitcount = u16(dv, 14), comp = u32(dv, 16), clrUsed = u32(dv, 32);
    var palette = 0;
    if (bitcount <= 8) palette = (clrUsed || (1 << bitcount)) * 4;
    else if (comp === 3) palette = 12;
    var split = hsz + palette;
    return [d.subarray(0, split), d.subarray(split)];
  }

  function dibsFromWmf(b) {
    var dv = new DataView(b.buffer, b.byteOffset, b.byteLength);
    var out = [], off = 18, n = b.length;
    while (off + 6 <= n) {
      var sizeWords = u32(dv, off), func = u16(dv, off + 4);
      if (sizeWords < 3) break;
      var end = off + sizeWords * 2;
      if (func === 0x0F43) out.push(splitDib(b.subarray(off + 6 + 4 + 2 + 16, end)));      // STRETCHDIB
      else if (func === 0x0B41) out.push(splitDib(b.subarray(off + 6 + 4 + 16, end)));      // DIBSTRETCHBLT
      else if (func === 0x0940) out.push(splitDib(b.subarray(off + 6 + 4 + 8, end)));       // DIBBITBLT
      if (func === 0) break;
      off = end;
    }
    return out.filter(Boolean);
  }

  function dibToBmp(bmi, bits) {
    var total = 14 + bmi.length + bits.length;
    var out = new Uint8Array(total);
    var dv = new DataView(out.buffer);
    out[0] = 0x42; out[1] = 0x4D; // 'BM'
    dv.setUint32(2, total, true);
    dv.setUint32(6, 0, true);
    dv.setUint32(10, 14 + bmi.length, true);
    out.set(bmi, 14);
    out.set(bits, 14 + bmi.length);
    return out;
  }

  // 生WMF/EMFバイト列 -> 最大DIBのBMPバイト列（失敗時 null）
  function wmfToBmp(raw) {
    var cands = [];
    var emf = extractEmf(raw);
    if (emf.length >= 4 && emf[0] === 1 && emf[1] === 0 && emf[2] === 0 && emf[3] === 0) {
      cands = cands.concat(dibsFromEmf(emf));
    }
    cands = cands.concat(dibsFromWmf(raw));
    var best = null, bestArea = -1;
    for (var i = 0; i < cands.length; i++) {
      var c = cands[i];
      if (!c) continue;
      var bmi = c[0];
      if (bmi.length < 40) continue;
      var dv = new DataView(bmi.buffer, bmi.byteOffset, bmi.byteLength);
      var w = dv.getInt32(4, true), h = dv.getInt32(8, true);
      var area = Math.abs(w * h);
      if (area > bestArea) { bestArea = area; best = c; }
    }
    return best ? dibToBmp(best[0], best[1]) : null;
  }

  // ===================================================================
  // 3. BMP -> PNG data URI（ブラウザ内蔵のBMPデコーダ + Canvas）
  // ===================================================================
  function bmpToPng(bmpBytes) {
    return new Promise(function (resolve) {
      var blob = new Blob([bmpBytes], { type: 'image/bmp' });
      var url = URL.createObjectURL(blob);
      var img = new Image();
      img.onload = function () {
        var w = img.naturalWidth, h = img.naturalHeight;
        URL.revokeObjectURL(url);
        if (!w || !h) { resolve(null); return; }
        try {
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0);
          resolve({ uri: canvas.toDataURL('image/png'), w: w, h: h });
        } catch (e) { resolve(null); }
      };
      img.onerror = function () { URL.revokeObjectURL(url); resolve(null); };
      img.src = url;
    });
  }

  // ===================================================================
  // 4. ノードHTML生成 + 全体変換
  // ===================================================================
  var IMG_SPLIT = /\x00IMG:(\d+)\x00/;

  function buildNodeHtml(paras, uris) {
    var divs = [];
    for (var pi = 0; pi < paras.length; pi++) {
      var parts = paras[pi].split(IMG_SPLIT);
      var buf = '';
      for (var j = 0; j < parts.length; j++) {
        if (j % 2 === 1) {
          var info = uris[parseInt(parts[j], 10)];
          if (info) buf += '<img src="' + info.uri + '" width="' + info.w + '" height="' + info.h + '" alt="">';
        } else if (parts[j]) {
          buf += escapeHtml(parts[j]).replace(/\t/g, '&#9;');
        }
      }
      divs.push('<div>' + (buf || '<br>') + '</div>');
    }
    return divs.join('');
  }

  async function nodeRtfToHtml(rtf) {
    if (!rtf) return '';
    var parsed = rtfBodyToParas(rtf);
    var uris = {};
    for (var bi = 0; bi < parsed.blobs.length; bi++) {
      var bmp = wmfToBmp(parsed.blobs[bi]);
      if (bmp) {
        var png = await bmpToPng(bmp);
        if (png) uris[bi] = png;
      }
    }
    return buildNodeHtml(parsed.paras, uris);
  }

  // text: decodeCP932済みの .nna テキスト全体。onProgress(done,total) は任意。
  async function convertNnaToCompact(text, title, onProgress) {
    var doc = window.NanaCore.parseNna(text); // { roots }
    var total = 0;
    window.NanaCore.walkTree(doc.roots, function () { total++; });
    var done = 0;

    async function walk(nodes) {
      var out = [];
      for (var i = 0; i < nodes.length; i++) {
        var nd = nodes[i];
        var html = await nodeRtfToHtml(nd.rtf);
        done++;
        if (onProgress && (done % 10 === 0 || done === total)) onProgress(done, total);
        out.push({ title: nd.title, html: html, children: await walk(nd.children || []) });
      }
      return out;
    }

    var roots = await walk(doc.roots);
    return { format: 'nanatree-web-compact', version: 1, title: title || '無題', roots: roots };
  }

  window.NanaImport = {
    convertNnaToCompact: convertNnaToCompact,
    wmfToBmp: wmfToBmp,   // テスト用に公開
    bmpToPng: bmpToPng
  };
})();

</script>
  <script>
/*
 * app.js — NanaTree Web版 UI層
 *
 * core.js（パーサ/シリアライザ、DOM非依存）と window.NanaRTF（RTF<->HTML、CP932。
 * 別ファイル rtf.js が提供、未読み込みでも動作を継続する）を利用して、
 * ツリー編集・リッチテキスト編集・ファイル入出力・自動保存・検索を行う。
 *
 * classic <script> 読み込み前提。ESモジュール/fetch()によるローカルファイル読込は使用しない。
 */

(function () {
  'use strict';

  // =====================================================================
  // 状態
  // =====================================================================

  var AUTOSAVE_KEY = 'nanaweb.autosave';
  var STATE_COLORS = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#1abc9c', '#3498db', '#9b59b6', '#34495e'];

  var state = {
    doc: { title: '無題', roots: [] },
    selectedNode: null,
    nodeEls: {},
    fileKind: null,     // 'nna' | 'nnz' | 'opml'
    fileName: null,
    fileHandle: null,   // FileSystemFileHandle（showSaveFilePicker利用時のみ）
    docDirty: false
  };

  var dragState = { node: null, pos: null, targetNode: null };
  var savedRange = null;
  var autosaveTimer = null;
  var pendingCompactImport = false;
  var searchMatches = [];
  var searchIndex = -1;
  var navHistory = [];      // 訪問したノードidの履歴（ブラウザの戻る/進む相当）
  var navPos = -1;          // navHistory 内の現在位置
  var navigating = false;   // 戻る/進む操作中は履歴に記録しない

  var dom = {};

  // =====================================================================
  // 初期化
  // =====================================================================

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    cacheDom();

    if (!hasNanaRTF()) {
      dom.rtfMissingBanner.hidden = false;
      dom.btnSaveNna.disabled = true;
      dom.btnSaveNna.title = (dom.btnSaveNna.title || '') + '（rtf.js が読み込まれていないため利用できません）';
    }

    try { document.execCommand('styleWithCSS', false, true); } catch (e) { /* 無視 */ }

    wireHeaderToolbar();
    wireTreeToolbar();
    wireEditorToolbar();
    wireContextMenu();
    wireSplitter();
    wireFileDrop();
    wireKeyboardShortcuts();
    wireTreeKeyboard();
    wireSearch();
    buildMenuBar();
    window.addEventListener('beforeunload', function (e) {
      if (state.docDirty) { e.preventDefault(); e.returnValue = ''; }
    });

    renderTree();
    updateDocTitleDisplay();
    checkAutosaveOnStartup();
    setStatus(hasNanaRTF() ? '準備完了' : '準備完了（rtf.js未読み込み: 本文編集と.nna/.nnz入出力は無効）', !hasNanaRTF());
  }

  function cacheDom() {
    var ids = [
      'menubar',
      'btnNew', 'btnOpen', 'btnSaveNna', 'btnFileMenu', 'fileMenu',
      'btnNavBack', 'btnNavForward', 'btnUndo', 'btnRedo',
      'replaceInput', 'btnReplaceAll', 'btnReplaceAllDoc',
      'searchInput', 'btnSearchNext', 'searchCount', 'docTitleDisplay',
      'rtfMissingBanner', 'autosaveBanner', 'btnAutosaveRestore', 'btnAutosaveDiscard',
      'appBody', 'treePane', 'splitter', 'editorPane',
      'treeScroll', 'treeRoot',
      'btnAddSibling', 'btnAddChild', 'btnDeleteNode', 'btnMoveUp', 'btnMoveDown', 'btnOutdent', 'btnIndent',
      'nodeTitleInput', 'editorToolbar', 'editorContent',
      'fontSizeSelect', 'foreColorInput', 'hiliteColorInput', 'btnHiliteOff', 'btnRemoveFormat',
      'btnInsertLink', 'btnUnlink',
      'statusMessage', 'autosaveStatus', 'contextMenu', 'dndOverlay', 'fileInput'
    ];
    ids.forEach(function (id) {
      if (!id) return;
      dom[id] = document.getElementById(id);
    });
  }

  function hasNanaRTF() {
    return !!(window.NanaRTF &&
      typeof window.NanaRTF.rtfToHtml === 'function' &&
      typeof window.NanaRTF.htmlToRtf === 'function' &&
      typeof window.NanaRTF.decodeCP932 === 'function' &&
      typeof window.NanaRTF.encodeCP932 === 'function');
  }

  // =====================================================================
  // ツリー データ操作ヘルパー
  // =====================================================================

  function hasChildren(node) {
    return !!(node.children && node.children.length);
  }

  function countDescendants(node) {
    var n = 0;
    (node.children || []).forEach(function (c) { n += 1 + countDescendants(c); });
    return n;
  }

  /** node を含む配列・親ノード・添字を探す。見つからなければ null。 */
  function findNodeContext(node) {
    function search(nodes, parentNode) {
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i] === node) return { parentNode: parentNode, array: nodes, index: i };
        if (nodes[i].children && nodes[i].children.length) {
          var r = search(nodes[i].children, nodes[i]);
          if (r) return r;
        }
      }
      return null;
    }
    return search(state.doc.roots, null);
  }

  function isDescendant(ancestor, node) {
    if (!ancestor.children) return false;
    for (var i = 0; i < ancestor.children.length; i++) {
      if (ancestor.children[i] === node) return true;
      if (isDescendant(ancestor.children[i], node)) return true;
    }
    return false;
  }

  function expandAncestors(node) {
    var ctx = findNodeContext(node);
    var p = ctx ? ctx.parentNode : null;
    while (p) {
      p.expanded = true;
      var pctx = findNodeContext(p);
      p = pctx ? pctx.parentNode : null;
    }
  }

  /** localStorageから復元した木、あるいは外部由来の木のノードIDを、このセッションの
   *  カウンタで振り直す（新規追加ノードとのID衝突を防ぐ）。 */
  function reassignIds(node) {
    node.id = (window.nextNodeId ? window.nextNodeId() : ('n' + Math.random().toString(36).slice(2)));
    (node.children || []).forEach(reassignIds);
  }

  function stateColor(idx) {
    var n = STATE_COLORS.length;
    return STATE_COLORS[((idx % n) + n) % n];
  }

  // =====================================================================
  // ツリー描画
  // =====================================================================

  function renderTree() {
    var root = dom.treeRoot;
    root.innerHTML = '';
    state.nodeEls = {};

    function renderList(nodes, depth) {
      nodes.forEach(function (node) {
        var row = createNodeRow(node, depth);
        root.appendChild(row);
        state.nodeEls[node.id] = row;
        if (node.expanded && hasChildren(node)) {
          renderList(node.children, depth + 1);
        }
      });
    }

    renderList(state.doc.roots, 0);
    updateSelectionHighlight();
    updateTreeToolbarState();
  }

  function createNodeRow(node, depth) {
    var row = document.createElement('div');
    row.className = 'tree-node-row';
    row.style.paddingLeft = (6 + depth * 18) + 'px';
    row.dataset.nodeId = node.id;
    row.draggable = true;
    row.setAttribute('role', 'treeitem');
    if (node.focused) row.classList.add('focused-marker');

    var twisty = document.createElement('span');
    var leaf = !hasChildren(node);
    twisty.className = 'twisty' + (leaf ? ' leaf' : '');
    twisty.textContent = leaf ? '' : (node.expanded ? '▾' : '▸');
    twisty.addEventListener('click', function (e) {
      e.stopPropagation();
      if (leaf) return;
      node.expanded = !node.expanded;
      renderTree();
    });
    row.appendChild(twisty);

    var dot = document.createElement('span');
    dot.className = 'state-dot';
    if (typeof node.stateIndex === 'number' && node.stateIndex !== -1) {
      dot.style.background = stateColor(node.stateIndex);
      dot.style.border = '1px solid rgba(0,0,0,0.15)';
      dot.title = '状態アイコン #' + node.stateIndex;
    }
    row.appendChild(dot);

    var title = document.createElement('span');
    title.className = 'title' + (node.title ? '' : ' empty-title');
    title.textContent = node.title || '（無題）';
    row.appendChild(title);

    row.addEventListener('click', function () { selectNode(node); focusTree(); });
    row.addEventListener('dblclick', function (e) { e.stopPropagation(); startRename(node, row); });
    row.addEventListener('contextmenu', function (e) {
      e.preventDefault();
      selectNode(node);
      openContextMenu(e.clientX, e.clientY);
    });

    row.addEventListener('dragstart', function (e) {
      dragState.node = node;
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', node.id); } catch (err) { /* 無視 */ }
    });
    row.addEventListener('dragover', function (e) { onRowDragOver(e, row, node); });
    row.addEventListener('dragleave', function () { row.classList.remove('drop-before', 'drop-after', 'drop-inside'); });
    row.addEventListener('drop', function (e) { onRowDrop(e, row, node); });
    row.addEventListener('dragend', function () { dragState.node = null; clearAllDropIndicators(); });

    return row;
  }

  function clearAllDropIndicators() {
    var rows = dom.treeRoot.querySelectorAll('.tree-node-row');
    rows.forEach(function (r) { r.classList.remove('drop-before', 'drop-after', 'drop-inside'); });
  }

  function onRowDragOver(e, row, targetNode) {
    if (!dragState.node) return;
    e.preventDefault();
    e.stopPropagation();
    var rect = row.getBoundingClientRect();
    var ratio = (e.clientY - rect.top) / rect.height;
    var pos;
    if (ratio < 0.25) pos = 'before';
    else if (ratio > 0.75) pos = 'after';
    else pos = 'inside';

    if (targetNode === dragState.node || isDescendant(dragState.node, targetNode)) {
      pos = null;
    }

    clearAllDropIndicators();
    if (pos === 'before') row.classList.add('drop-before');
    else if (pos === 'after') row.classList.add('drop-after');
    else if (pos === 'inside') row.classList.add('drop-inside');

    dragState.pos = pos;
    dragState.targetNode = targetNode;
    e.dataTransfer.dropEffect = pos ? 'move' : 'none';
  }

  function onRowDrop(e, row, targetNode) {
    e.preventDefault();
    e.stopPropagation();
    clearAllDropIndicators();
    var node = dragState.node;
    var pos = dragState.pos;
    dragState.node = null;
    if (!node || !pos) return;

    var srcCtx = findNodeContext(node);
    if (!srcCtx) return;
    srcCtx.array.splice(srcCtx.index, 1);

    if (pos === 'inside') {
      targetNode.children = targetNode.children || [];
      targetNode.children.push(node);
      targetNode.expanded = true;
    } else {
      var tgtCtx = findNodeContext(targetNode);
      if (!tgtCtx) { // 万一見つからない場合はルート末尾に戻す（データ消失を防ぐ）
        state.doc.roots.push(node);
      } else {
        var insertIndex = pos === 'before' ? tgtCtx.index : tgtCtx.index + 1;
        tgtCtx.array.splice(insertIndex, 0, node);
      }
    }

    renderTree();
    selectNode(node);
    markDocDirty();
    scheduleAutosave();
  }

  function updateSelectionHighlight() {
    Object.keys(state.nodeEls).forEach(function (id) {
      var el = state.nodeEls[id];
      var isSel = state.selectedNode && state.selectedNode.id === id;
      el.classList.toggle('selected', !!isSel);
    });
  }

  function scrollNodeIntoView(node) {
    var el = state.nodeEls[node.id];
    if (el) el.scrollIntoView({ block: 'nearest' });
  }

  function updateTreeToolbarState() {
    var has = !!state.selectedNode;
    [dom.btnAddChild, dom.btnDeleteNode, dom.btnMoveUp, dom.btnMoveDown, dom.btnOutdent, dom.btnIndent]
      .forEach(function (b) { b.disabled = !has; });
  }

  // =====================================================================
  // 名前の変更（インライン編集）
  // =====================================================================

  function startRename(node, row) {
    if (!row) return;
    var titleEl = row.querySelector('.title');
    if (!titleEl) return;

    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'title-input';
    input.value = node.title || '';
    titleEl.replaceWith(input);
    input.focus();
    input.select();

    var committed = false;
    function commit() {
      if (committed) return;
      committed = true;
      renameNodeTo(node, input.value);
      renderTree();
    }
    function cancel() {
      if (committed) return;
      committed = true;
      renderTree();
    }
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
      e.stopPropagation();
    });
    input.addEventListener('blur', function () { commit(); });
    input.addEventListener('click', function (e) { e.stopPropagation(); });
  }

  function renameNodeTo(node, newTitle) {
    if (node.title === newTitle) return;
    node.title = newTitle;
    if (state.selectedNode === node && dom.nodeTitleInput.value !== newTitle) {
      dom.nodeTitleInput.value = newTitle;
    }
    markDocDirty();
    scheduleAutosave();
  }

  function startRenameForNode(node) {
    var row = state.nodeEls[node.id];
    if (row) startRename(node, row);
  }

  // =====================================================================
  // ツリー編集アクション
  // =====================================================================

  function addSiblingNode() {
    var sel = state.selectedNode;
    var newNode = createNode('');
    if (!sel) {
      state.doc.roots.push(newNode);
    } else {
      var ctx = findNodeContext(sel);
      if (ctx) ctx.array.splice(ctx.index + 1, 0, newNode);
      else state.doc.roots.push(newNode);
    }
    renderTree();
    selectNode(newNode);
    startRenameForNode(newNode);
    markDocDirty();
    scheduleAutosave();
  }

  function addChildNode() {
    var sel = state.selectedNode;
    var newNode = createNode('');
    if (!sel) {
      state.doc.roots.push(newNode);
    } else {
      sel.children = sel.children || [];
      sel.children.push(newNode);
      sel.expanded = true;
    }
    renderTree();
    selectNode(newNode);
    startRenameForNode(newNode);
    markDocDirty();
    scheduleAutosave();
  }

  function deleteSelectedNode() {
    var sel = state.selectedNode;
    if (!sel) return;
    var label = sel.title || '（無題ノード）';
    var count = countDescendants(sel);
    var msg = count > 0
      ? '「' + label + '」と、その子ノード ' + count + ' 件をすべて削除します。この操作は取り消せません。よろしいですか？'
      : '「' + label + '」を削除します。この操作は取り消せません。よろしいですか？';
    if (!window.confirm(msg)) return;

    var ctx = findNodeContext(sel);
    if (!ctx) return;
    ctx.array.splice(ctx.index, 1);

    state.selectedNode = null;
    dom.editorContent.innerHTML = '';
    dom.editorContent.contentEditable = 'false';
    dom.nodeTitleInput.value = '';
    dom.nodeTitleInput.disabled = true;

    renderTree();
    markDocDirty();
    scheduleAutosave();
    setStatus('削除しました: ' + label);
  }

  function moveNodeUp() {
    var sel = state.selectedNode; if (!sel) return;
    var ctx = findNodeContext(sel); if (!ctx || ctx.index === 0) return;
    var arr = ctx.array;
    var tmp = arr[ctx.index - 1];
    arr[ctx.index - 1] = arr[ctx.index];
    arr[ctx.index] = tmp;
    renderTree();
    updateSelectionHighlight();
    scrollNodeIntoView(sel);
    markDocDirty();
    scheduleAutosave();
  }

  function moveNodeDown() {
    var sel = state.selectedNode; if (!sel) return;
    var ctx = findNodeContext(sel); if (!ctx || ctx.index >= ctx.array.length - 1) return;
    var arr = ctx.array;
    var tmp = arr[ctx.index + 1];
    arr[ctx.index + 1] = arr[ctx.index];
    arr[ctx.index] = tmp;
    renderTree();
    updateSelectionHighlight();
    scrollNodeIntoView(sel);
    markDocDirty();
    scheduleAutosave();
  }

  function indentNode() {
    var sel = state.selectedNode; if (!sel) return;
    var ctx = findNodeContext(sel); if (!ctx) return;
    if (ctx.index === 0) { setStatus('これ以上階層を下げられません（直前に兄ノードがありません）。', true); return; }
    var prevSibling = ctx.array[ctx.index - 1];
    ctx.array.splice(ctx.index, 1);
    prevSibling.children = prevSibling.children || [];
    prevSibling.children.push(sel);
    prevSibling.expanded = true;
    renderTree();
    updateSelectionHighlight();
    scrollNodeIntoView(sel);
    markDocDirty();
    scheduleAutosave();
  }

  function outdentNode() {
    var sel = state.selectedNode; if (!sel) return;
    var ctx = findNodeContext(sel); if (!ctx) return;
    if (!ctx.parentNode) { setStatus('これ以上階層を上げられません（すでに最上位です）。', true); return; }
    var parentCtx = findNodeContext(ctx.parentNode);
    if (!parentCtx) return;
    ctx.array.splice(ctx.index, 1);
    parentCtx.array.splice(parentCtx.index + 1, 0, sel);
    renderTree();
    updateSelectionHighlight();
    scrollNodeIntoView(sel);
    markDocDirty();
    scheduleAutosave();
  }

  // =====================================================================
  // 選択・エディタ同期
  // =====================================================================

  function resolveNodeHtml(node) {
    if (node.html !== null) return;
    if (!node.rtf) { node.html = ''; return; }
    if (hasNanaRTF()) {
      try {
        node.html = window.NanaRTF.rtfToHtml(node.rtf);
      } catch (err) {
        console.error(err);
        setStatus('本文の変換に失敗しました: ' + (err && err.message ? err.message : err), true);
      }
    }
    // NanaRTFが無い場合は node.html を null のままにし、呼び出し元でフォールバック表示する。
  }

  function selectNode(node) {
    if (state.selectedNode === node) return;
    commitEditorToNode(state.selectedNode);

    state.selectedNode = node;
    updateSelectionHighlight();
    updateTreeToolbarState();

    dom.nodeTitleInput.disabled = false;
    dom.nodeTitleInput.value = node.title || '';

    resolveNodeHtml(node);

    dom.editorContent.innerHTML = '';
    if (node.html !== null) {
      // 表示時に <nlink>見出し</nlink> をクリック可能なリンク(<a>)へ変換する。
      dom.editorContent.innerHTML = renderNlinks(node.html);
      // ブラウザによるHTML正規化後の値で同期しておく。こうしないと「開いただけ」のノードが
      // 正規化差分だけで誤ってdirty判定されてしまう（無劣化パススルーの原則を守るため）。
      // 保存用の正規形はリンクを <nlink> タグへ戻したもの。
      node.html = stripNlinks(dom.editorContent.innerHTML);
      dom.editorContent.contentEditable = 'true';
    } else {
      var notice = document.createElement('div');
      notice.style.color = 'var(--text-muted)';
      notice.style.fontStyle = 'italic';
      notice.textContent = 'この本文は rtf.js が読み込まれていないため表示できません。元データは失われていません。';
      dom.editorContent.appendChild(notice);
      dom.editorContent.contentEditable = 'false';
    }

    recordNavigation(node);
    syncToolbarState();
  }

  // =====================================================================
  // ノード訪問履歴（ブラウザの戻る／進む相当。本家NanaTreeのナビ機能）
  // =====================================================================

  function findNodeById(id) {
    var found = null;
    walkTree(state.doc.roots, function (n) { if (!found && n.id === id) found = n; });
    return found;
  }

  function recordNavigation(node) {
    if (navigating || !node) return;
    // 同じノードを連続で記録しない
    if (navPos >= 0 && navHistory[navPos] === node.id) return;
    // 途中から新しいノードへ移ったら、それ以降（進む側）の履歴を捨てる
    navHistory = navHistory.slice(0, navPos + 1);
    navHistory.push(node.id);
    if (navHistory.length > 300) navHistory.shift();   // 上限
    navPos = navHistory.length - 1;
    updateNavButtons();
  }

  function navGo(delta) {
    var target = navPos + delta;
    // 削除済みノードのidは飛ばす
    while (target >= 0 && target < navHistory.length && !findNodeById(navHistory[target])) {
      target += delta;
    }
    if (target < 0 || target >= navHistory.length) { updateNavButtons(); return; }
    var node = findNodeById(navHistory[target]);
    if (!node) { updateNavButtons(); return; }
    navPos = target;
    navigating = true;
    expandAncestors(node);
    renderTree();
    selectNode(node);
    scrollNodeIntoView(node);
    navigating = false;
    updateNavButtons();
  }

  function updateNavButtons() {
    if (dom.btnNavBack) dom.btnNavBack.disabled = !(navPos > 0);
    if (dom.btnNavForward) dom.btnNavForward.disabled = !(navPos >= 0 && navPos < navHistory.length - 1);
  }

  function resetNavigation() {
    navHistory = [];
    navPos = -1;
    updateNavButtons();
  }

  // =====================================================================
  // 元に戻す / やり直し（本文エディタ）
  // =====================================================================

  function editorUndo() {
    if (dom.editorContent.contentEditable !== 'true') { setStatus('本文を選択しているときに使えます。', true); return; }
    dom.editorContent.focus();
    try { document.execCommand('undo'); } catch (e) { /* 無視 */ }
    commitEditorToNode(state.selectedNode);
  }

  function editorRedo() {
    if (dom.editorContent.contentEditable !== 'true') { setStatus('本文を選択しているときに使えます。', true); return; }
    dom.editorContent.focus();
    try { document.execCommand('redo'); } catch (e) { /* 無視 */ }
    commitEditorToNode(state.selectedNode);
  }

  // =====================================================================
  // 置換
  // =====================================================================

  // HTML文字列内のテキスト部分だけを from->to に置換して {html, count} を返す（タグは壊さない）。
  function replaceInHtmlText(html, from, to) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html || '';
    var count = 0;
    var walker = document.createTreeWalker(tmp, NodeFilter.SHOW_TEXT, null);
    var textNodes = [];
    var t;
    while ((t = walker.nextNode())) textNodes.push(t);
    for (var i = 0; i < textNodes.length; i++) {
      var v = textNodes[i].nodeValue;
      if (v && v.indexOf(from) !== -1) {
        var parts = v.split(from);
        count += parts.length - 1;
        textNodes[i].nodeValue = parts.join(to);
      }
    }
    return { html: tmp.innerHTML, count: count };
  }

  function countOccurrences(s, sub) {
    if (!s || !sub) return 0;
    return s.split(sub).length - 1;
  }

  function doReplace(scope) {
    var from = dom.searchInput.value;
    var to = dom.replaceInput.value;
    if (!from) { setStatus('置換するには、上の検索欄に「探す文字」を入れてください。', true); return; }

    // 開いているノードの未確定編集を先に取り込む
    commitEditorToNode(state.selectedNode);

    // 全体置換では、まだ開いていないノードの本文（RTF）もHTMLへ展開してから置換する。
    // これをしないと、一度も開いていないノードの本文が置換対象から漏れる。
    if (scope === 'all') ensureAllHtmlResolved();

    var total = 0;
    var nodesChanged = 0;

    function applyToNode(node) {
      var c = 0;
      // タイトル
      if (node.title && node.title.indexOf(from) !== -1) {
        c += countOccurrences(node.title, from);
        node.title = node.title.split(from).join(to);
      }
      // 本文（htmlのテキスト部分のみ）
      if (node.html) {
        var r = replaceInHtmlText(node.html, from, to);
        if (r.count > 0) { node.html = r.html; c += r.count; }
      }
      if (c > 0) { node.dirty = true; nodesChanged++; total += c; }
    }

    if (scope === 'all') {
      walkTree(state.doc.roots, applyToNode);
    } else {
      if (!state.selectedNode) { setStatus('置換する項目を左のツリーで選んでください。', true); return; }
      applyToNode(state.selectedNode);
    }

    if (total === 0) { setStatus('「' + from + '」は見つかりませんでした。', true); return; }

    markDocDirty();
    scheduleAutosave();
    // 表示を更新
    renderTree();
    if (state.selectedNode) {
      var keep = state.selectedNode;
      state.selectedNode = null;      // selectNode の同一ノード早期returnを回避して再描画
      selectNode(keep);
      scrollNodeIntoView(keep);
    }
    setStatus('置換しました: ' + total + '件' + (scope === 'all' ? '（' + nodesChanged + '項目）' : '') +
      '  「' + from + '」→「' + to + '」');
  }

  // =====================================================================
  // ツリーのキーボード操作（十字キーで移動・展開／NanaTree本家の操作感）
  // =====================================================================

  function focusTree() {
    if (dom.treeScroll) dom.treeScroll.focus();
  }

  /** 現在画面に見えているノードを描画順（上から下）に並べた配列を返す。 */
  function visibleNodesInOrder() {
    var list = [];
    (function rec(nodes) {
      nodes.forEach(function (node) {
        list.push(node);
        if (node.expanded && hasChildren(node)) rec(node.children);
      });
    })(state.doc.roots);
    return list;
  }

  function selectAndReveal(node) {
    if (!node) return;
    selectNode(node);
    scrollNodeIntoView(node);
  }

  function wireTreeKeyboard() {
    if (!dom.treeScroll) return;
    dom.treeScroll.setAttribute('tabindex', '0');
    dom.treeScroll.addEventListener('keydown', function (e) {
      // インライン改名中（入力欄にフォーカス）は乗っ取らない
      if (e.target && e.target.tagName === 'INPUT') return;
      var visible = visibleNodesInOrder();
      if (!visible.length) return;
      var node = state.selectedNode;
      if (!node || visible.indexOf(node) === -1) {
        if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'Home') {
          e.preventDefault(); selectAndReveal(visible[0]);
        }
        return;
      }
      var idx = visible.indexOf(node);
      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault();
          if (idx < visible.length - 1) selectAndReveal(visible[idx + 1]);
          break;
        case 'ArrowUp':
          e.preventDefault();
          if (idx > 0) selectAndReveal(visible[idx - 1]);
          break;
        case 'ArrowRight':
          e.preventDefault();
          if (hasChildren(node)) {
            if (!node.expanded) { node.expanded = true; renderTree(); }
            else selectAndReveal(node.children[0]);
          }
          break;
        case 'ArrowLeft':
          e.preventDefault();
          if (hasChildren(node) && node.expanded) {
            node.expanded = false; renderTree();
          } else {
            var ctx = findNodeContext(node);
            if (ctx && ctx.parentNode) selectAndReveal(ctx.parentNode);
          }
          break;
        case 'Home':
          e.preventDefault(); selectAndReveal(visible[0]);
          break;
        case 'End':
          e.preventDefault(); selectAndReveal(visible[visible.length - 1]);
          break;
        case 'Enter':
        case 'F2':
          e.preventDefault(); startRenameForNode(node);
          break;
      }
    });
  }

  function commitEditorToNode(node) {
    if (!node) return;
    if (dom.editorContent.contentEditable !== 'true') return;
    // 表示用の <a class="nlink"> を保存用の <nlink> タグへ戻してから比較・保存する。
    var newHtml = stripNlinks(dom.editorContent.innerHTML);
    if (newHtml !== node.html) {
      node.html = newHtml;
      node.dirty = true;
      markDocDirty();
      scheduleAutosave();
    }
  }

  // =====================================================================
  // リッチテキスト編集ツールバー（execCommand）
  // =====================================================================

  function saveSelectionIfInEditor() {
    var sel = window.getSelection();
    if (sel && sel.rangeCount && dom.editorContent.contains(sel.anchorNode)) {
      savedRange = sel.getRangeAt(0).cloneRange();
    }
  }

  function restoreSelection() {
    if (!savedRange) return;
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }

  function execToolbarCommand(cmd, value) {
    if (dom.editorContent.contentEditable !== 'true') return;
    dom.editorContent.focus();
    restoreSelection();
    try { document.execCommand(cmd, false, value === undefined ? null : value); } catch (e) { /* 無視 */ }
    syncToolbarState();
    commitEditorToNode(state.selectedNode);
  }

  function execHilite(color) {
    if (dom.editorContent.contentEditable !== 'true') return;
    dom.editorContent.focus();
    restoreSelection();
    var ok = false;
    try { ok = document.execCommand('hiliteColor', false, color); } catch (e) { /* 無視 */ }
    if (!ok) { try { document.execCommand('backColor', false, color); } catch (e) { /* 無視 */ } }
    syncToolbarState();
    commitEditorToNode(state.selectedNode);
  }

  var TOOLBAR_STATE_CMDS = [
    'bold', 'italic', 'underline', 'strikeThrough',
    'justifyLeft', 'justifyCenter', 'justifyRight',
    'insertUnorderedList', 'insertOrderedList',
    'subscript', 'superscript'
  ];

  function syncToolbarState() {
    if (dom.editorContent.contentEditable !== 'true') return;
    TOOLBAR_STATE_CMDS.forEach(function (cmd) {
      var btn = dom.editorToolbar.querySelector('[data-cmd="' + cmd + '"]');
      if (!btn) return;
      var active = false;
      try { active = document.queryCommandState(cmd); } catch (e) { /* 無視 */ }
      btn.classList.toggle('active', active);
    });
  }

  function wireEditorToolbar() {
    dom.editorToolbar.querySelectorAll('button[data-cmd]').forEach(function (btn) {
      btn.addEventListener('click', function () { execToolbarCommand(btn.dataset.cmd); });
    });
    dom.fontSizeSelect.addEventListener('change', function () {
      execToolbarCommand('fontSize', dom.fontSizeSelect.value);
    });
    dom.foreColorInput.addEventListener('input', function () {
      execToolbarCommand('foreColor', dom.foreColorInput.value);
    });
    dom.hiliteColorInput.addEventListener('input', function () {
      execHilite(dom.hiliteColorInput.value);
    });
    dom.btnHiliteOff.addEventListener('click', function () { execHilite('transparent'); });
    dom.btnRemoveFormat.addEventListener('click', function () { execToolbarCommand('removeFormat'); });
    dom.btnInsertLink.addEventListener('click', insertNlink);
    dom.btnUnlink.addEventListener('click', unlinkNlink);

    dom.editorContent.addEventListener('input', function () { commitEditorToNode(state.selectedNode); });
    dom.editorContent.addEventListener('mouseup', saveSelectionIfInEditor);
    dom.editorContent.addEventListener('keyup', saveSelectionIfInEditor);
    document.addEventListener('selectionchange', function () {
      saveSelectionIfInEditor();
      syncToolbarState();
    });

    dom.nodeTitleInput.addEventListener('input', function () {
      if (state.selectedNode) renameNodeTo(state.selectedNode, dom.nodeTitleInput.value);
    });

    // リンク(<a class="nlink">)はシングルクリックで同名ノードへジャンプ
    dom.editorContent.addEventListener('click', function (e) {
      var a = e.target && e.target.closest ? e.target.closest('a.nlink') : null;
      if (a) {
        e.preventDefault();
        activateNlink(a.getAttribute('data-nlink') || a.textContent || '');
      }
    });
    // リンク化されなかった（書式が分断された等）<nlink> はダブルクリックで従来どおりジャンプ
    dom.editorContent.addEventListener('dblclick', function (e) {
      var info = findNlinkAtPoint(e.clientX, e.clientY);
      if (info) {
        e.preventDefault();
        activateNlink(info.title);
      }
    });
  }

  // =====================================================================
  // <nlink> ノードリンク
  // =====================================================================

  function findNlinkAtPoint(x, y) {
    if (!document.caretRangeFromPoint) return null;
    var range = document.caretRangeFromPoint(x, y);
    if (!range) return null;
    var container = range.startContainer;
    if (container.nodeType !== 3) return null;
    var text = container.nodeValue || '';
    var offset = range.startOffset;
    var re = /<nlink>([\s\S]*?)<\/nlink>/g;
    var m;
    while ((m = re.exec(text))) {
      var start = m.index;
      var end = start + m[0].length;
      if (offset >= start && offset <= end) {
        return { title: m[1] };
      }
    }
    return null;
  }

  // 保存用HTML内の <nlink>見出し</nlink>（＝ &lt;nlink&gt;…&lt;/nlink&gt; とエスケープ済み）を、
  // クリック可能なリンク <a class="nlink" data-nlink="見出し"> へ変換する（表示専用）。
  // 中に別タグを含む複雑なケース（rtfで書式が分断された場合）は変換せず従来のダブルクリックに委ねる。
  function renderNlinks(html) {
    if (!html) return html;
    return html.replace(
      /&lt;nlink&gt;((?:(?!&lt;\/?nlink&gt;)[^<>])*?)&lt;\/nlink&gt;/g,
      function (_m, inner) {
        // <nlink> …</nlink> のタグは薄く表示したまま、全体をクリックで同名ノードへジャンプ。
        return '<a class="nlink" contenteditable="false" data-nlink="' + inner + '" title="クリックで「' +
          inner + '」へジャンプ"><span class="nlink-tag">&lt;nlink&gt;</span>' + inner +
          '<span class="nlink-tag">&lt;/nlink&gt;</span></a>';
      }
    );
  }

  // 表示用リンク <a class="nlink"> を保存用の <nlink> タグ（エスケープ済みテキスト）へ戻す。
  function stripNlinks(html) {
    if (!html || html.indexOf('class="nlink"') === -1) return html;
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    var anchors = tmp.querySelectorAll('a.nlink');
    for (var i = 0; i < anchors.length; i++) {
      var a = anchors[i];
      var t = a.getAttribute('data-nlink');
      if (t == null) t = a.textContent || '';
      a.parentNode.replaceChild(document.createTextNode('<nlink>' + t + '</nlink>'), a);
    }
    return tmp.innerHTML;
  }

  // 選択した文字列をノードリンクにする（元NanaTreeの「リンク文字挿入」に相当）。
  // 選択テキスト＝ジャンプ先の見出し名。表示は青リンク、保存時は <nlink>見出し</nlink>。
  function insertNlink() {
    if (dom.editorContent.contentEditable !== 'true') { setStatus('本文を選択してから押してください。', true); return; }
    dom.editorContent.focus();
    restoreSelection();
    var sel = window.getSelection();
    if (!sel || !sel.rangeCount) { setStatus('リンクにする見出し名を選択してください。', true); return; }
    var range = sel.getRangeAt(0);
    var text = range.toString();
    if (!text) { setStatus('リンクにする見出し名を選択してから「リンク挿入」を押してください。', true); return; }
    if (text.indexOf('\n') !== -1) { setStatus('リンクは改行をまたげません。1行の見出し名を選択してください。', true); return; }
    range.deleteContents();
    var a = document.createElement('a');
    a.className = 'nlink';
    a.setAttribute('contenteditable', 'false');
    a.setAttribute('data-nlink', text);
    a.title = 'クリックで「' + text + '」へジャンプ';
    var mkTag = function (s) { var sp = document.createElement('span'); sp.className = 'nlink-tag'; sp.textContent = s; return sp; };
    a.appendChild(mkTag('<nlink>'));
    a.appendChild(document.createTextNode(text));
    a.appendChild(mkTag('</nlink>'));
    range.insertNode(a);
    range.setStartAfter(a); range.collapse(true);
    sel.removeAllRanges(); sel.addRange(range);
    saveSelectionIfInEditor();
    commitEditorToNode(state.selectedNode);
    var hit = findNodeByTitleDFS(state.doc.roots, text);
    setStatus(hit ? ('リンクを作成しました（ジャンプ先: ' + text + '）') :
      ('リンクを作成しました。※同名の見出し「' + text + '」は現在ありません（作成すればジャンプできます）。'));
  }

  // カーソル位置／選択範囲にあるリンクをふつうの文字（見出し名）に戻す。
  function unlinkNlink() {
    if (dom.editorContent.contentEditable !== 'true') return;
    var all = dom.editorContent.querySelectorAll('a.nlink');
    if (!all.length) { setStatus('この本文にリンクはありません。', true); return; }
    var sel = window.getSelection();
    var targets = [];
    if (sel && sel.rangeCount) {
      var range = sel.getRangeAt(0);
      all.forEach(function (a) {
        var touches = false;
        try { touches = range.intersectsNode(a); } catch (e) { touches = false; }
        if (touches) targets.push(a);
      });
      if (!targets.length) {
        // 折りたたんだカーソル位置の直前／親にあるリンクを対象にする
        var node = sel.anchorNode;
        var el = node ? (node.nodeType === 1 ? node : node.parentNode) : null;
        var a = el && el.closest ? el.closest('a.nlink') : null;
        if (!a && el) {
          var pv = el.previousElementSibling;
          if (pv && pv.classList && pv.classList.contains('nlink')) a = pv;
        }
        if (a) targets.push(a);
      }
    }
    if (!targets.length) { setStatus('解除したいリンクを選択するか、リンクの直後にカーソルを置いてから押してください。', true); return; }
    targets.forEach(function (a) {
      a.parentNode.replaceChild(document.createTextNode(a.getAttribute('data-nlink') || a.textContent || ''), a);
    });
    commitEditorToNode(state.selectedNode);
    setStatus('リンクを解除しました（' + targets.length + '件）。');
  }

  function activateNlink(title) {

  function stripExt(name) {
    var idx = name.lastIndexOf('.');
    return idx > 0 ? name.slice(0, idx) : name;
  }

  function pad2(n) { return (n < 10 ? '0' : '') + n; }

  function formatTimestamp(d) {
    return '' + d.getFullYear() + pad2(d.getMonth() + 1) + pad2(d.getDate()) +
      pad2(d.getHours()) + pad2(d.getMinutes()) + pad2(d.getSeconds());
  }

  async function decompressDeflate(arrayBuffer) {
    if (typeof DecompressionStream === 'undefined') {
      throw new Error('このブラウザは .nnz の展開（DecompressionStream）に対応していません。');
    }
    var blob = new Blob([arrayBuffer]);
    var ds = blob.stream().pipeThrough(new DecompressionStream('deflate'));
    return await new Response(ds).arrayBuffer();
  }

  async function compressDeflate(arrayBuffer) {
    if (typeof CompressionStream === 'undefined') {
      throw new Error('このブラウザは .nnz の圧縮（CompressionStream）に対応していません。');
    }
    var blob = new Blob([arrayBuffer]);
    var cs = blob.stream().pipeThrough(new CompressionStream('deflate'));
    return await new Response(cs).arrayBuffer();
  }

  function loadDocument(doc, meta) {
    state.doc = { title: (doc && doc.title) || '無題', roots: (doc && doc.roots) || [] };
    (state.doc.roots || []).forEach(reassignIds);
    resetNavigation();

    state.fileKind = meta.kind || null;
    state.fileName = meta.fileName || null;
    state.fileHandle = meta.fileHandle || null;
    state.selectedNode = null;

    dom.editorContent.innerHTML = '';
    dom.editorContent.contentEditable = 'false';
    dom.nodeTitleInput.value = '';
    dom.nodeTitleInput.disabled = true;

    renderTree();

    var focused = findFocusedNode(state.doc.roots);
    var first = focused || state.doc.roots[0] || null;
    if (first) {
      expandAncestors(first);
      renderTree();
      selectNode(first);
      scrollNodeIntoView(first);
    }

    updateDocTitleDisplay();
    markDocClean();
  }

  async function openFileObject(file) {
    var name = file.name || 'ファイル';
    var ext = (name.split('.').pop() || '').toLowerCase();
    try {
      if (ext === 'nna' || ext === 'nnz') {
        if (!hasNanaRTF()) {
          setStatus('.nna/.nnz を開くには rtf.js が必要です（読み込まれていません）。', true);
          return;
        }
        var buf = await file.arrayBuffer();
        if (ext === 'nnz') buf = await decompressDeflate(buf);
        var bytes = new Uint8Array(buf);
        var text = window.NanaRTF.decodeCP932(bytes);
        var parsed = parseNna(text);
        loadDocument({ title: stripExt(name), roots: parsed.roots }, { kind: ext, fileName: name });
        setStatus('読み込みました: ' + name);
      } else if (ext === 'opml' || ext === 'xml') {
        var xmlText = await file.text();
        var opmlDoc = parseOpml(xmlText);
        loadDocument({ title: opmlDoc.title || stripExt(name), roots: opmlDoc.roots }, { kind: 'opml', fileName: name });
        setStatus('読み込みました: ' + name);
      } else if (ext === 'nwt') {
        // コンパクト取り込み形式（tools/import_nna_compact.py が生成）。
        // 画像はPNG data URIで各ノードのhtmlに埋め込み済み。rtf.js 不要。
        var cjson = JSON.parse(await file.text());
        loadDocument({ title: cjson.title || stripExt(name), roots: compactToModel(cjson.roots || []) },
          { kind: 'nwt', fileName: name });
        setStatus('取り込みました（コンパクト形式）: ' + name);
      } else if (ext === 'txt') {
        // 階層化テキスト（NanaTree互換）。UTF-8とCP932の両方を受け付ける
        var tbuf = await file.arrayBuffer();
        var tbytes = new Uint8Array(tbuf);
        var ttext;
        try {
          ttext = new TextDecoder('utf-8', { fatal: true }).decode(tbytes);
        } catch (_e) {
          ttext = new TextDecoder('shift_jis').decode(tbytes);
        }
        if (ttext.charCodeAt(0) === 0xFEFF) ttext = ttext.slice(1);
        var troots = treeTextToModel(ttext);
        loadDocument({ title: stripExt(name), roots: troots }, { kind: 'txt', fileName: name });
        setStatus('階層化テキストとして読み込みました: ' + name);
      } else {
        var sniffText = await file.text();
        if (/^\s*<\?xml/.test(sniffText) || /<opml[\s>]/i.test(sniffText)) {
          var od = parseOpml(sniffText);
          loadDocument({ title: od.title || stripExt(name), roots: od.roots }, { kind: 'opml', fileName: name });
          setStatus('OPMLとして読み込みました: ' + name);
        } else if (/"format"\s*:\s*"nanatree-web-compact"/.test(sniffText)) {
          var cj = JSON.parse(sniffText);
          loadDocument({ title: cj.title || stripExt(name), roots: compactToModel(cj.roots || []) }, { kind: 'nwt', fileName: name });
          setStatus('取り込みました（コンパクト形式）: ' + name);
        } else if (hasNanaRTF()) {
          var nd = parseNna(sniffText);
          loadDocument({ title: stripExt(name), roots: nd.roots }, { kind: 'nna', fileName: name });
          setStatus('.nna形式として読み込みました: ' + name);
        } else {
          setStatus('不明な形式のファイルです（拡張子: ' + (ext || 'なし') + '）。', true);
        }
      }
    } catch (err) {
      console.error(err);
      setStatus('ファイルを開けませんでした: ' + (err && err.message ? err.message : err), true);
    }
  }

  // 巨大.nna/.nnz をブラウザ内でコンパクト形式に変換して取り込む（Python不要、nnaimport.js）。
  async function importNnaCompact(file) {
    if (!window.NanaImport) { setStatus('取り込みモジュール（nnaimport.js）が読み込まれていません。', true); return; }
    if (!hasNanaRTF()) { setStatus('.nna の取り込みには rtf.js が必要です。', true); return; }
    var name = file.name || 'ファイル';
    var ext = (name.split('.').pop() || '').toLowerCase();
    try {
      setStatus('読み込み中… ' + name);
      var buf = await file.arrayBuffer();
      if (ext === 'nnz') buf = await decompressDeflate(buf);
      var text = window.NanaRTF.decodeCP932(new Uint8Array(buf));
      // 変換中はUIをブロックしないよう await が随所で入る（画像デコードごとにyield）
      var compact = await window.NanaImport.convertNnaToCompact(text, stripExt(name), function (done, total) {
        setStatus('画像を変換中… ' + done + ' / ' + total + ' ノード');
      });
      loadDocument({ title: compact.title, roots: compactToModel(compact.roots) }, { kind: 'nwt', fileName: stripExt(name) + '.nwt' });
      setStatus('軽量取り込み完了: ' + name + '（「.nwt保存」で次回から高速に開けます）');
    } catch (err) {
      console.error(err);
      setStatus('取り込みに失敗しました: ' + (err && err.message ? err.message : err), true);
    }
  }

  // 現在の文書をコンパクト形式(.nwt)として保存する。
  async function saveCompactNwt() {
    commitEditorToNode(state.selectedNode);
    var unresolved = ensureAllHtmlResolved();
    if (unresolved > 0) {
      setStatus('rtf.js が無いため本文を変換できないノードがあります（' + unresolved + '件、空文字で出力）。', true);
    }
    function walk(nodes) {
      return (nodes || []).map(function (n) {
        return { title: n.title, html: n.html || '', children: walk(n.children) };
      });
    }
    var doc = { format: 'nanatree-web-compact', version: 1, title: state.doc.title || '無題', roots: walk(state.doc.roots) };
    var bytes = new TextEncoder().encode(JSON.stringify(doc));
    var suggestedName = (state.doc.title || '無題') + '.nwt';
    var ok = await saveBytesToFile(bytes, suggestedName, 'application/json');
    if (ok) setStatus('コンパクト保存しました: ' + suggestedName);
  }

  // コンパクト取り込み形式(.nwt)のノード配列 -> アプリのデータモデル。
  // htmlは変換済み（画像はPNG data URI埋め込み）なのでRTFは持たない。
  function compactToModel(list) {
    return list.map(function (c) {
      var node = window.NanaCore.createNode(c.title || '');
      node.html = c.html || '';
      node.rtf = null;      // 元RTFなし。.nna保存時は html から生成される（非可逆レーン）
      node.dirty = false;   // 取り込み直後は未編集
      node.children = compactToModel(c.children || []);
      node.expanded = node.children.length > 0;
      return node;
    });
  }

  function regenerateDirtyRtf() {
    var unresolvedCount = 0;
    walkTree(state.doc.roots, function (node) {
      if (node.dirty && node.html !== null) {
        if (hasNanaRTF()) {
          try {
            node.rtf = window.NanaRTF.htmlToRtf(node.html);
            node.dirty = false;
          } catch (err) {
            console.error(err);
            unresolvedCount++;
          }
        } else {
          unresolvedCount++;
        }
      }
    });
    return unresolvedCount;
  }

  async function saveBytesToFile(bytes, suggestedName, mime) {
    if (window.showSaveFilePicker) {
      try {
        var ext = suggestedName.split('.').pop();
        var accept = {};
        accept[mime || 'application/octet-stream'] = ['.' + ext];
        var handle = await window.showSaveFilePicker({
          suggestedName: suggestedName,
          types: [{ description: 'NanaTree Web file', accept: accept }]
        });
        var writable = await handle.createWritable();
        await writable.write(bytes);
        await writable.close();
        state.fileHandle = handle;
        return true;
      } catch (err) {
        if (err && err.name === 'AbortError') {
          setStatus('保存をキャンセルしました。');
          return false;
        }
        console.warn('showSaveFilePicker failed, falling back to download:', err);
        // フォールスルーしてBlobダウンロードを試みる
      }
    }
    var blob = new Blob([bytes], { type: mime || 'application/octet-stream' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = suggestedName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 4000);
    return true;
  }

  async function saveDocumentAs(kind) {
    if (!hasNanaRTF()) {
      setStatus('.nna/.nnz を保存するには rtf.js が必要です（読み込まれていません）。', true);
      return;
    }
    commitEditorToNode(state.selectedNode);
    var unresolved = regenerateDirtyRtf();
    if (unresolved > 0) {
      setStatus('一部ノードの本文変換に失敗したため、元の本文のまま保存します（' + unresolved + '件）。', true);
    }

    var text = serializeNna(state.doc);
    var bytes;
    try {
      bytes = window.NanaRTF.encodeCP932(text);
    } catch (err) {
      setStatus('CP932への変換に失敗しました: ' + (err && err.message ? err.message : err), true);
      return;
    }

    var outBytes = bytes;
    if (kind === 'nnz') {
      try {
        var arrBuf = bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength);
        var compressed = await compressDeflate(arrBuf);
        outBytes = new Uint8Array(compressed);
      } catch (err) {
        setStatus('圧縮に失敗しました: ' + (err && err.message ? err.message : err), true);
        return;
      }
    }

    var suggestedName = (state.fileName ? stripExt(state.fileName) : (state.doc.title || '無題')) + '.' + kind;
    var ok = await saveBytesToFile(outBytes, suggestedName, 'application/octet-stream');
    if (ok) {
      state.fileName = suggestedName;
      state.fileKind = kind;
      markDocClean();
      setStatus('保存しました: ' + suggestedName);
    }
  }

  function ensureAllHtmlResolved() {
    var unresolved = 0;
    walkTree(state.doc.roots, function (node) {
      if (node.html === null) {
        if (node.rtf && hasNanaRTF()) {
          try { node.html = window.NanaRTF.rtfToHtml(node.rtf); }
          catch (e) { node.html = ''; unresolved++; }
        } else {
          node.html = '';
          if (node.rtf) unresolved++;
        }
      }
    });
    return unresolved;
  }

  async function exportOpml() {
    commitEditorToNode(state.selectedNode);
    var unresolved = ensureAllHtmlResolved();
    if (unresolved > 0) {
      setStatus('rtf.js が無いため本文を変換できないノードがあります（' + unresolved + '件、空文字で出力）。', true);
    }
    var text = buildOpml(state.doc);
    var stamp = formatTimestamp(new Date());
    var suggestedName = (state.doc.title || '無題') + '_' + stamp + '.xml';
    var bytes = new TextEncoder().encode(text);
    var ok = await saveBytesToFile(bytes, suggestedName, 'application/xml');
    if (ok) setStatus('OPMLを書き出しました: ' + suggestedName);
  }

  // =====================================================================
  // 階層化テキスト（NanaTree互換、treetext.js）
  // =====================================================================

  function treeTextToModel(text) {
    var parsed = window.NanaTreeText.parseTreeText(text);
    function toNode(t) {
      var node = window.NanaCore.createNode(t.title);
      node.html = t.bodyText ? window.NanaCore.noteTextToHtml(t.bodyText) : '';
      node.rtf = null;   // 元RTFなし。.nna保存時は html から生成する
      node.dirty = true;
      node.children = (t.children || []).map(toNode);
      node.expanded = node.children.length > 0;
      return node;
    }
    return parsed.map(toNode);
  }

  async function exportTreeText() {
    if (!window.NanaTreeText) {
      setStatus('treetext.js が読み込まれていません。', true);
      return;
    }
    commitEditorToNode(state.selectedNode);
    var unresolved = ensureAllHtmlResolved();
    if (unresolved > 0) {
      setStatus('rtf.js が無いため本文を変換できないノードがあります（' + unresolved + '件、空文字で出力）。', true);
    }
    function toPlain(node) {
      return {
        title: node.title,
        bodyText: window.NanaCore.htmlToPlainText(node.html || ''),
        children: (node.children || []).map(toPlain)
      };
    }
    var text = window.NanaTreeText.buildTreeText((state.doc.roots || []).map(toPlain));
    // NanaTree/NanaTerry が読める CP932 で出力（rtf.js 不在時のみ UTF-8）
    var bytes = hasNanaRTF() ? window.NanaRTF.encodeCP932(text) : new TextEncoder().encode(text);
    var suggestedName = (state.doc.title || '無題') + '.txt';
    var ok = await saveBytesToFile(bytes, suggestedName, 'text/plain');
    if (ok) setStatus('階層化テキストを書き出しました: ' + suggestedName);
  }

  // =====================================================================
  // ドラッグ&ドロップ（ウィンドウへファイルをドロップして開く）
  // =====================================================================

  function wireFileDrop() {
    function hasFiles(e) {
      return e.dataTransfer && e.dataTransfer.types && Array.prototype.indexOf.call(e.dataTransfer.types, 'Files') !== -1;
    }
    window.addEventListener('dragover', function (e) {
      if (!hasFiles(e)) return;
      e.preventDefault();
      dom.dndOverlay.classList.add('active');
    });
    window.addEventListener('dragleave', function (e) {
      if (e.clientX <= 0 || e.clientY <= 0 || e.clientX >= window.innerWidth || e.clientY >= window.innerHeight) {
        dom.dndOverlay.classList.remove('active');
      }
    });
    window.addEventListener('drop', function (e) {
      if (!hasFiles(e)) return;
      e.preventDefault();
      dom.dndOverlay.classList.remove('active');
      var files = e.dataTransfer.files;
      if (files && files.length) openFileObject(files[0]);
    });
  }

  // =====================================================================
  // 自動保存（localStorage）
  // =====================================================================

  function scheduleAutosave() {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(doAutosave, 1500);
  }

  // doc全体のおおよその文字数（rtf+html+title）。lengthを足すだけなので巨大文書でも軽い。
  function estimateDocChars() {
    var total = 0;
    walkTree(state.doc.roots, function (n) {
      if (n.rtf) total += n.rtf.length;
      if (n.html) total += n.html.length;
      if (n.title) total += n.title.length;
    });
    return total;
  }

  function doAutosave() {
    // 巨大文書ではdoc全体のJSON.stringifyがGB級メモリと数秒のUIフリーズを招き、しかも
    // localStorage(約5MB)には入りきらず必ず失敗する。事前にサイズを見積もって自動保存を
    // スキップする（手動保存は使える）。小さい文書を開き直せば自動的に再開する。
    if (estimateDocChars() > 2000000) {
      if (dom.autosaveStatus) {
        dom.autosaveStatus.textContent = '自動保存: 無効（文書が大きいため。手動保存をお使いください）';
      }
      return;
    }
    try {
      var payload = JSON.stringify({
        savedAt: Date.now(),
        fileKind: state.fileKind,
        fileName: state.fileName,
        doc: state.doc
      });
      localStorage.setItem(AUTOSAVE_KEY, payload);
      if (dom.autosaveStatus) {
        dom.autosaveStatus.textContent = '自動保存: ' + new Date().toLocaleTimeString('ja-JP');
      }
    } catch (err) {
      setStatus('自動保存に失敗しました（ストレージ容量不足の可能性があります）: ' + (err && err.message ? err.message : err), true);
    }
  }

  function checkAutosaveOnStartup() {
    var raw = null;
    try { raw = localStorage.getItem(AUTOSAVE_KEY); } catch (err) { /* 無視 */ }
    if (!raw) return;
    dom.autosaveBanner.hidden = false;

    dom.btnAutosaveRestore.onclick = function () {
      try {
        var data = JSON.parse(raw);
        if (data && data.doc) {
          loadDocument(data.doc, { kind: data.fileKind, fileName: data.fileName });
          markDocDirty(); // 復元直後は未保存扱いにしておく（元ファイルへは未反映のため）
          setStatus('自動保存データを復元しました。');
        }
      } catch (err) {
        setStatus('自動保存データの復元に失敗しました: ' + (err && err.message ? err.message : err), true);
      }
      dom.autosaveBanner.hidden = true;
    };
    dom.btnAutosaveDiscard.onclick = function () {
      try { localStorage.removeItem(AUTOSAVE_KEY); } catch (err) { /* 無視 */ }
      dom.autosaveBanner.hidden = true;
    };
  }

  // =====================================================================
  // 検索
  // =====================================================================

  function wireSearch() {
    dom.searchInput.addEventListener('input', function () {
      runSearch(dom.searchInput.value);
    });
    dom.searchInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); searchNext(); }
    });
    dom.btnSearchNext.addEventListener('click', searchNext);
  }

  function runSearch(query) {
    query = (query || '').trim();
    searchMatches = [];
    searchIndex = -1;
    if (!query) { updateSearchCount(); return; }
    walkTree(state.doc.roots, function (node) {
      var titleMatch = node.title && node.title.indexOf(query) !== -1;
      var bodyMatch = false;
      if (!titleMatch && node.html) {
        bodyMatch = htmlToPlainText(node.html).indexOf(query) !== -1;
      }
      if (titleMatch || bodyMatch) searchMatches.push(node);
    });
    updateSearchCount();
  }

  function updateSearchCount() {
    if (!dom.searchCount) return;
    if (!searchMatches.length) { dom.searchCount.textContent = dom.searchInput.value ? '0件' : ''; return; }
    dom.searchCount.textContent = (searchIndex + 1) + ' / ' + searchMatches.length;
  }

  function searchNext() {
    // 削除・新規作成・ファイル切替で木が変わると、searchMatches が現在の木から
    // 外れたノードを指し続ける。そのまま選択→編集すると切り離されたノードに
    // 書き込まれ内容が失われる。候補が現在の木に残っているか検証し、外れていれば
    // 検索し直す。
    if (searchMatches.length) {
      var present = new Set();
      walkTree(state.doc.roots, function (n) { present.add(n); });
      if (!searchMatches.every(function (n) { return present.has(n); })) {
        searchMatches = [];
        searchIndex = -1;
      }
    }
    if (!searchMatches.length) {
      runSearch(dom.searchInput.value);
      if (!searchMatches.length) { setStatus('見つかりませんでした（本文検索は開いたことのあるノードのみ対象です）。', true); return; }
    }
    searchIndex = (searchIndex + 1) % searchMatches.length;
    var node = searchMatches[searchIndex];
    expandAncestors(node);
    renderTree();
    selectNode(node);
    scrollNodeIntoView(node);
    updateSearchCount();
  }

  // =====================================================================
  // キーボードショートカット
  // =====================================================================

  function wireKeyboardShortcuts() {
    document.addEventListener('keydown', function (e) {
      var ctrl = e.ctrlKey || e.metaKey;
      if (ctrl && e.key.toLowerCase() === 'o') {
        e.preventDefault();
        dom.fileInput.click();
      } else if (ctrl && e.key.toLowerCase() === 's') {
        e.preventDefault();
        saveDocumentAs('nna');
      } else if (e.altKey && e.key === 'ArrowLeft') {
        e.preventDefault();
        navGo(-1);
      } else if (e.altKey && e.key === 'ArrowRight') {
        e.preventDefault();
        navGo(1);
      } else if (ctrl && !e.shiftKey && e.key.toLowerCase() === 'y') {
        // Ctrl+Y = やり直し（Ctrl+Zはエディタ標準のundoに任せる）
        if (document.activeElement === dom.editorContent) { e.preventDefault(); editorRedo(); }
      } else if (ctrl && e.shiftKey && e.key.toLowerCase() === 'z') {
        if (document.activeElement === dom.editorContent) { e.preventDefault(); editorRedo(); }
      } else if (e.key === 'F2') {
        if (state.selectedNode &&
            document.activeElement !== dom.editorContent &&
            document.activeElement !== dom.nodeTitleInput) {
          e.preventDefault();
          startRenameForNode(state.selectedNode);
        }
      }
    });
  }

})();

</script>
